"use strict";
const $ = id => document.getElementById(id);
let LANG = "fr";
try{ LANG = localStorage.getItem("gexLang") || "fr"; }catch(_){}

/* ───────── comptes à rebours (heure de Paris, du lundi au vendredi) ───────── */
const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function parisParts(){
  const f = new Intl.DateTimeFormat("en-US", {timeZone:"Europe/Paris", hour12:false,
    weekday:"short", hour:"2-digit", minute:"2-digit", second:"2-digit"});
  const p = {};
  for (const x of f.formatToParts(new Date())) p[x.type] = x.value;
  return p;
}
function secsUntil(hh, mm){
  const p = parisParts();
  const now = (+p.hour % 24) * 3600 + (+p.minute) * 60 + (+p.second);
  let delta = hh * 3600 + mm * 60 - now;
  let d = WD.indexOf(p.weekday);
  if (delta <= 0){ delta += 86400; d = (d + 1) % 7; }
  while (d === 0 || d === 6){ delta += 86400; d = (d + 1) % 7; }   // week-end
  return delta;
}
function fmtDur(s){
  const j = Math.floor(s / 86400); s %= 86400;
  const h = String(Math.floor(s / 3600)).padStart(2, "0"); s %= 3600;
  const m = String(Math.floor(s / 60)).padStart(2, "0");
  const x = String(s % 60).padStart(2, "0");
  return (j ? j + (LANG === "fr" ? " j " : "d ") : "") + h + ":" + m + ":" + x;
}
/* équivalent dans le fuseau du visiteur */
function localOf(hh, mm){
  const t = new Date(Date.now() + secsUntil(hh, mm) * 1000);
  return t.toLocaleTimeString(LANG === "fr" ? "fr-FR" : "en-GB",
                              {hour:"2-digit", minute:"2-digit"});
}
function tickCd(){
  const L = T[LANG];
  $("cd1").textContent = fmtDur(secsUntil(0, 11));
  $("cd2").textContent = fmtDur(secsUntil(15, 25));
  $("cd1h").textContent = L.cdLocal + " " + localOf(0, 11);
  $("cd2h").textContent = L.cdLocal + " " + localOf(15, 25);
}

    <p><b>I refresh and the levels don't change. Is that normal?</b> Yes — after 15:25 they are deliberately locked for the day. Only price, basis and IV update.</p>
    <p><b>My price differs slightly from TradingView.</b> Expected outside the US session, where the delayed futures feed is shown. During the session the gap should stay within a point or two.</p>
    <p><b>Can I hold a multi-day position on these levels?</b> No. They are intraday markers: the gamma structure is recomputed daily and can change sharply from one session to the next.</p>
    <p><b>Why is the Expected Move centred on the open rather than the current price?</b> Because it measures the range expected <b>for the session</b>. Centring it on live price would make it drift all day and lose all meaning.</p>`]]
}};

function render(){
  const L = T[LANG];
  document.documentElement.lang = LANG;
  $("hTitle").textContent = L.title;
  $("nTerm").textContent = L.term;
  $("nDash").textContent = L.dash;
  $("nHeat").textContent = L.heat;
  $("lead").textContent = L.lead;
  $("cd1k").textContent = L.cd1k; $("cd1s").textContent = L.cd1s;
  $("cd2k").textContent = L.cd2k; $("cd2s").textContent = L.cd2s;
  $("foot").textContent = L.foot;
  $("bFr").className = LANG === "fr" ? "on" : "";
  $("bEn").className = LANG === "en" ? "on" : "";
  $("toc").innerHTML = L.secs.map(s => `<a href="#${s[0]}">${s[1]}</a>`).join("");
  $("body").innerHTML = L.secs.map((s, i) =>
    `<section id="${s[0]}"><h2><span>${String(i + 1).padStart(2, "0")}</span>${s[1]}</h2>${s[2]}</section>`
  ).join("");
  tickCd();
}
function setLang(l){
  LANG = l;
  try{ localStorage.setItem("gexLang", l); }catch(_){}
  render();
}
$("bFr").onclick = () => setLang("fr");
$("bEn").onclick = () => setLang("en");
render();
setInterval(tickCd, 1000);
</script>
</body>
</html>
