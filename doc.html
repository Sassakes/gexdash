<style>
  :root{
    --bg:#0A0A0C; --surface:#111114; --surface2:#16161A; --surface3:#1B1B20;
    --line:#212127; --line-strong:#2E2E36;
    --text:#ECEAE4; --muted:#8A8A94; --faint:#5C5C66;
    --gold:#F0B90B; --teal:#26A69A; --red:#EF5350; --blue:#5B8DEF;
    --mono:"IBM Plex Mono",monospace; --sans:"Space Grotesk",sans-serif;
  }
  *{box-sizing:border-box; margin:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6}
  a{color:var(--gold)}

  /* ── barre du haut ── */
  header{
    display:flex; align-items:center; gap:12px; padding:13px 20px; flex-wrap:wrap;
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:30;
    background:rgba(10,10,12,.95); backdrop-filter:blur(10px);
  }
  header h1{font-size:12.5px; letter-spacing:.2em; text-transform:uppercase; font-weight:600}
  header h1 b{color:var(--gold)}
  .nav{display:flex; gap:3px; margin-left:auto; align-items:center; flex-wrap:wrap}
  .nav a{color:var(--muted); font-size:12px; text-decoration:none; padding:6px 10px;
         border:1px solid transparent}
  .nav a:hover{color:var(--text); border-color:var(--line-strong); background:var(--surface2)}
  .lang{display:flex; border:1px solid var(--line-strong); margin-left:5px}
  .lang button{background:none; border:none; color:var(--muted); font:inherit;
               font-size:11px; padding:5px 10px; cursor:pointer}
  .lang button.on{background:var(--gold); color:#0A0A0C; font-weight:600}

  /* ── hero + compteurs ── */
  .hero{padding:30px 20px 4px; max-width:1180px; margin:0 auto}
  .hero h2{font-size:23px; font-weight:600; letter-spacing:-.01em}
  .hero p{color:var(--muted); font-size:14px; margin-top:7px; max-width:620px}
  .cds{display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
       gap:11px; margin-top:22px}
  .cd{background:var(--surface); border:1px solid var(--line); padding:15px 17px;
      position:relative; overflow:hidden}
  .cd::after{content:""; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--gold)}
  .cd.b::after{background:var(--teal)}
  .cd .k{font-size:9px; letter-spacing:.15em; text-transform:uppercase; color:var(--faint)}
  .cd .n{font-family:var(--mono); font-size:25px; color:var(--gold); margin:5px 0 1px;
         font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .cd.b .n{color:var(--teal)}
  .cd .s{font-size:11.5px; color:var(--muted)}
  .cd .h{font-family:var(--mono); font-size:10.5px; color:var(--faint); margin-top:2px}

  /* ── mise en page sommaire + contenu ── */
  .wrap{display:grid; grid-template-columns:216px 1fr; gap:34px;
        max-width:1180px; margin:0 auto; padding:26px 20px 90px; align-items:start}
  .toc{position:sticky; top:70px}
  .toc .lbl{font-size:9px; letter-spacing:.16em; text-transform:uppercase;
            color:var(--faint); padding:0 10px 8px}
  .toc a{display:flex; gap:9px; align-items:baseline; padding:7px 10px; font-size:12.5px;
         color:var(--muted); text-decoration:none; border-left:2px solid transparent}
  .toc a i{font-family:var(--mono); font-size:10px; color:var(--faint); font-style:normal}
  .toc a:hover{color:var(--text); background:var(--surface)}
  .toc a.on{color:var(--gold); border-left-color:var(--gold); background:var(--surface)}
  .toc a.on i{color:var(--gold)}

  /* ── sections ── */
  section{margin-bottom:16px; scroll-margin-top:74px;
          background:var(--surface); border:1px solid var(--line)}
  .shead{display:flex; align-items:center; gap:12px; padding:16px 22px;
         border-bottom:1px solid var(--line); background:var(--surface2)}
  .shead i{font-family:var(--mono); font-size:11px; color:var(--gold); font-style:normal;
           border:1px solid rgba(240,185,11,.35); padding:3px 8px}
  .shead h3{font-size:15px; font-weight:600; letter-spacing:.01em}
  .sbody{padding:20px 22px}
  .sbody > * + *{margin-top:14px}
  p.tx{font-size:13.5px; color:var(--muted); max-width:70ch}
  p.tx b, li b{color:var(--text); font-weight:600}
  code{font-family:var(--mono); font-size:12px; background:var(--surface3);
       border:1px solid var(--line-strong); padding:1px 6px; color:var(--text)}

  /* blocs : chips explicatifs */
  .chips{display:grid; grid-template-columns:repeat(auto-fit,minmax(215px,1fr)); gap:11px}
  .chip{background:var(--surface2); border:1px solid var(--line); padding:14px 16px}
  .chip .tg{font-family:var(--mono); font-size:11px; padding:2px 9px; border:1px solid;
            display:inline-block; margin-bottom:9px}
  .chip.g .tg{color:var(--gold); border-color:rgba(240,185,11,.5)}
  .chip.t .tg{color:var(--teal); border-color:rgba(38,166,154,.5)}
  .chip.r .tg{color:var(--red); border-color:rgba(239,83,80,.5)}
  .chip p{font-size:12.5px; color:var(--muted)}

  /* blocs : grille de codes */
  .codes{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:9px}
  .cx{display:flex; gap:12px; background:var(--surface2); border:1px solid var(--line);
      padding:11px 13px}
  .cx .kk{font-family:var(--mono); font-size:12px; color:var(--gold); min-width:52px;
          padding-top:1px}
  .cx .nn{font-size:12.5px; color:var(--text); font-weight:500}
  .cx .dd{font-size:12px; color:var(--muted); margin-top:3px; line-height:1.5}

  /* blocs : étapes */
  .steps{counter-reset:st}
  .steps li{list-style:none; counter-increment:st; position:relative;
            padding:11px 0 11px 42px; font-size:13px; color:var(--muted);
            border-bottom:1px solid rgba(255,255,255,.05)}
  .steps li:last-child{border-bottom:none}
  .steps li::before{content:counter(st); position:absolute; left:0; top:10px;
    width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:11px; color:var(--gold);
    border:1px solid rgba(240,185,11,.35)}

  /* blocs : horloges */
  .clocks{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:11px}
  .clk{background:var(--surface2); border:1px solid var(--line); padding:15px 17px}
  .clk .hh{font-family:var(--mono); font-size:19px; color:var(--gold)}
  .clk.b .hh{color:var(--teal)}
  .clk .tt{font-size:12.5px; color:var(--text); font-weight:500; margin:2px 0 11px}
  .clk .rw{font-size:12px; color:var(--muted); padding:7px 0;
           border-top:1px solid rgba(255,255,255,.055)}
  .clk .rw span{display:block; font-size:9px; letter-spacing:.13em;
                text-transform:uppercase; color:var(--faint); margin-bottom:2px}

  /* blocs : liste simple */
  ul.pl{list-style:none}
  ul.pl li{font-size:13px; color:var(--muted); padding:6px 0 6px 17px; position:relative}
  ul.pl li::before{content:"—"; position:absolute; left:0; color:var(--faint)}

  /* blocs : note */
  .note{background:var(--surface2); border:1px solid var(--line);
        border-left:2px solid var(--gold); padding:13px 16px; font-size:12.5px;
        color:var(--muted)}

  /* blocs : accordéon */
  .faq{border:1px solid var(--line)}
  .faq details{border-bottom:1px solid var(--line)}
  .faq details:last-child{border-bottom:none}
  .faq summary{cursor:pointer; padding:13px 16px; font-size:13px; color:var(--text);
    list-style:none; display:flex; align-items:center; gap:11px; background:var(--surface2)}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary::before{content:"+"; font-family:var(--mono); color:var(--gold); font-size:14px}
  .faq details[open] summary::before{content:"−"}
  .faq summary:hover{color:var(--gold)}
  .faq .ans{padding:2px 16px 15px 40px; font-size:12.5px; color:var(--muted)}

  footer{border-top:1px solid var(--line); padding:20px; text-align:center;
         color:var(--faint); font-size:11px}

  @media (max-width:860px){
    .wrap{grid-template-columns:1fr; gap:18px}
    .toc{position:static; display:flex; gap:6px; overflow-x:auto; padding-bottom:6px}
    .toc .lbl{display:none}
    .toc a{border-left:none; border:1px solid var(--line-strong); white-space:nowrap;
           padding:6px 11px}
    .toc a.on{border-color:var(--gold)}
    .toc a i{display:none}
    .hero{padding-top:22px}
    .hero h2{font-size:20px}
  }
</style>
</head>

try{ LANG = localStorage.getItem("gexLang") || "fr"; }catch(_){}

/* ───── comptes à rebours (heure de Paris, lundi→vendredi) ───── */
const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function parisParts(){
  const f = new Intl.DateTimeFormat("en-US", {timeZone:"Europe/Paris", hour12:false,
    weekday:"short", hour:"2-digit", minute:"2-digit", second:"2-digit"});
  const p = {};
  for (const x of f.formatToParts(new Date())) p[x.type] = x.value;
  return p;
}
function secsUntil(hh, mm){
  const p = parisParts();
  const now = (+p.hour % 24) * 3600 + (+p.minute) * 60 + (+p.second);
  let delta = hh * 3600 + mm * 60 - now;
  let d = WD.indexOf(p.weekday);
  if (delta <= 0){ delta += 86400; d = (d + 1) % 7; }
  while (d === 0 || d === 6){ delta += 86400; d = (d + 1) % 7; }
  return delta;
}
function fmtDur(s){
  const j = Math.floor(s / 86400); s %= 86400;
  const h = String(Math.floor(s / 3600)).padStart(2, "0"); s %= 3600;
  const m = String(Math.floor(s / 60)).padStart(2, "0");
  return (j ? j + (LANG === "fr" ? " j " : "d ") : "") + h + ":" + m + ":" +
         String(s % 60).padStart(2, "0");
}
function localOf(hh, mm){
  return new Date(Date.now() + secsUntil(hh, mm) * 1000)
    .toLocaleTimeString(LANG === "fr" ? "fr-FR" : "en-GB", {hour:"2-digit", minute:"2-digit"});
}
function tickCd(){
  const L = T[LANG];
  $("cd1").textContent = fmtDur(secsUntil(0, 11));
  $("cd2").textContent = fmtDur(secsUntil(15, 25));
  $("cd1h").textContent = L.cdLocal + " " + localOf(0, 11);
  $("cd2h").textContent = L.cdLocal + " " + localOf(15, 25);
}

/* ───── rendu des blocs ───── */
function blockHtml(b){
  switch (b.t){
    case "p":  return `<p class="tx">${b.x}</p>`;
    case "h":  return `<p class="tx" style="color:var(--text);font-weight:600;font-size:12.5px;
                        letter-spacing:.06em;text-transform:uppercase;margin-top:20px">${b.x}</p>`;
    case "note": return `<div class="note">${b.x}</div>`;
    case "chips": return `<div class="chips">${b.items.map(i =>
      `<div class="chip ${i.c}"><span class="tg">${i.tag}</span><p>${i.x}</p></div>`).join("")}</div>`;
    case "codes": return `<div class="codes">${b.items.map(i =>
      `<div class="cx"><div class="kk">${i.k}</div><div><div class="nn">${i.n}</div>
       <div class="dd">${i.d}</div></div></div>`).join("")}</div>`;
    case "steps": return `<ol class="steps">${b.items.map(i => `<li>${i}</li>`).join("")}</ol>`;
    case "ul": return `<ul class="pl">${b.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
    case "clocks": return `<div class="clocks">${b.items.map(i =>
      `<div class="clk ${i.c}"><div class="hh">${i.h}</div><div class="tt">${i.t}</div>
       <div class="rw"><span>${LANG === "fr" ? "Recalculé" : "Recomputed"}</span>${i.a}</div>
       <div class="rw"><span>${LANG === "fr" ? "Conservé" : "Kept"}</span>${i.b}</div></div>`).join("")}</div>`;
    case "faq": return `<div class="faq">${b.items.map(i =>
      `<details><summary>${i.q}</summary><div class="ans">${i.a}</div></details>`).join("")}</div>`;
    default: return "";
  }
}

function render(){
  const L = T[LANG];
  document.documentElement.lang = LANG;
  $("hTitle").textContent = L.title;
  $("nTerm").textContent = L.term;
  $("nDash").textContent = L.dash;
  $("nHeat").textContent = L.heat;
  $("heroT").textContent = L.heroT;
  $("heroP").textContent = L.heroP;
  $("cd1k").textContent = L.cd1k; $("cd1s").textContent = L.cd1s;
  $("cd2k").textContent = L.cd2k; $("cd2s").textContent = L.cd2s;
  $("foot").textContent = L.foot;
  $("bFr").className = LANG === "fr" ? "on" : "";
  $("bEn").className = LANG === "en" ? "on" : "";

  $("toc").innerHTML = `<div class="lbl">${L.toc}</div>` + L.secs.map((s, i) =>
    `<a href="#${s.id}" data-s="${s.id}"><i>${String(i + 1).padStart(2, "0")}</i>${s.t}</a>`).join("");
  $("body").innerHTML = L.secs.map((s, i) =>
    `<section id="${s.id}"><div class="shead"><i>${String(i + 1).padStart(2, "0")}</i>
       <h3>${s.t}</h3></div><div class="sbody">${s.b.map(blockHtml).join("")}</div></section>`).join("");

  /* surlignage de la section courante dans le sommaire */
  if (window._io) window._io.disconnect();
  window._io = new IntersectionObserver(es => {
    for (const e of es){
      if (!e.isIntersecting) continue;
      document.querySelectorAll("#toc a").forEach(a =>
        a.classList.toggle("on", a.dataset.s === e.target.id));
    }
  }, {rootMargin:"-74px 0px -70% 0px"});
  document.querySelectorAll("main section").forEach(s => window._io.observe(s));
  tickCd();
}
function setLang(l){
  LANG = l;
  try{ localStorage.setItem("gexLang", l); }catch(_){}
  render();
}
$("bFr").onclick = () => setLang("fr");
$("bEn").onclick = () => setLang("en");
render();
setInterval(tickCd, 1000);
</script>
