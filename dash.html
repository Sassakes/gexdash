<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GEX Terminal — Mon dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="/ui.js"></script>
<style>
  :root{
    --bg:#0A0A0C; --surface:#111114; --surface2:#16161A;
    --line:#212127; --line-strong:#2B2B33;
    --text:#ECEAE4; --muted:#8A8A94; --faint:#5C5C66;
    --gold:#F0B90B; --gold-soft:rgba(240,185,11,.13); --gold-glow:rgba(240,185,11,.32);
    --teal:#26A69A; --red:#EF5350;
    --mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --disp:"Space Grotesk", var(--mono);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  #empty{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:72px 20px; min-height:46vh;
  }
  #empty[hidden]{display:none}
  #empty .empty-t{font-family:var(--disp); font-size:16px; color:var(--text); letter-spacing:.01em}
  #empty .empty-s{color:var(--muted); font-size:12.5px; margin:6px 0 22px}
  .presets{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
  .presets button{
    background:var(--surface); border:1px solid var(--line-strong); color:var(--muted);
    font:inherit; font-size:12px; padding:10px 16px; cursor:pointer;
    transition:color .14s ease, border-color .14s ease, transform .14s ease;
  }
  .presets button:hover{color:var(--gold); border-color:var(--gold-glow); transform:translateY(-1px)}
  .ccount{
    font-size:10.5px; color:var(--faint); letter-spacing:.14em; text-transform:uppercase;
    padding:2px 9px; border:1px solid var(--line); border-radius:20px; white-space:nowrap;
  }
  body{
    background:
      radial-gradient(1100px 420px at 50% -180px, rgba(240,185,11,.055), transparent 62%),
      var(--bg);
    color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:""; position:fixed; inset:0 0 auto 0; height:1px; z-index:10;
    background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
  }
  main{max-width:none; margin:0; padding:26px 24px 56px}  /* plan de travail pleine largeur */
  a{color:var(--gold)}
  button, select{font-family:var(--mono)}
  header{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding-bottom:18px; margin-bottom:18px; border-bottom:1px solid var(--line);
  }
  .mark{width:26px; height:26px; flex:none}
  header h1{
    font-family:var(--disp); font-size:15px; font-weight:700;
    letter-spacing:.2em; text-transform:uppercase; white-space:nowrap;
  }
  header h1 em{font-style:normal; color:var(--gold)}
  .topnav{margin-left:auto; display:flex; align-items:center; gap:4px}
  .topnav a{
    color:var(--muted); text-decoration:none; font-size:12px; padding:6px 10px;
    transition:color .12s ease; white-space:nowrap;
  }
  .topnav a:hover{color:var(--gold)}
  .addbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px}
  .addbar select{
    background:var(--surface2); border:1px solid var(--line); color:var(--text);
    font-size:12px; padding:8px 10px; cursor:pointer; min-height:36px;
  }
  #addBtn{
    background:var(--gold-soft); color:var(--gold); border:1px solid var(--gold);
    font-size:12px; font-weight:500; padding:8px 18px; cursor:pointer; min-height:36px;
  }
  #addBtn:hover{background:rgba(240,185,11,.24)}
  #editBtn{
    background:var(--surface); border:1px solid var(--line-strong); color:var(--muted);
    font-size:12px; padding:8px 16px; cursor:pointer; min-height:36px;
    transition:color .12s ease, border-color .12s ease;
  }
  #editBtn:hover{color:var(--gold)}
  #editBtn.on{background:var(--gold-soft); color:var(--gold); border-color:var(--gold)}
  .hint{color:var(--faint); font-size:11.5px}
  #board{position:relative}
  .card{
    position:absolute; background:linear-gradient(180deg, #131317, #101013);
    border:1px solid var(--line);
  }
  .card .head{
    display:flex; align-items:center; gap:10px; height:37px;
    padding:0 12px; border-bottom:1px solid var(--line);
  }
  .card .head .t{
    font-family:var(--disp); font-size:10px; font-weight:600; letter-spacing:.18em;
    text-transform:uppercase; color:var(--gold);
  }
  .card .head .n{font-size:10.5px; color:var(--faint)}
  .cpanel{
    position:absolute; top:8px; right:8px; z-index:9; width:220px;
    background:rgba(14,14,18,.97); border:1px solid var(--line-strong);
    box-shadow:0 14px 40px rgba(0,0,0,.7); padding:12px; font-size:11px;
  }
  .cpanel .cp-head{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--line);
  }
  .cpanel .cp-head b{
    font-family:var(--disp); font-size:9.5px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--gold);
  }
  .cpanel .cp-x{background:none; border:none; color:var(--faint); cursor:pointer; font-size:13px}
  .cpanel .cp-x:hover{color:var(--text)}
  .cp-row{display:flex; justify-content:space-between; align-items:center; gap:8px; padding:6px 0; color:var(--muted)}
  .cp-sw{display:flex; gap:6px; align-items:center}
  .cpanel input[type=color]{
    width:22px; height:22px; padding:0; border:1px solid var(--line-strong);
    background:var(--surface2); cursor:pointer; border-radius:4px;
  }
  .cp-rst{
    width:100%; margin-top:8px; background:var(--surface2); border:1px solid var(--line);
    color:var(--muted); font:inherit; font-size:10.5px; padding:6px; cursor:pointer;
  }
  .cp-rst:hover{color:var(--gold)}
  #tzDash{
    background:var(--surface2); border:1px solid var(--line); color:var(--text);
    font-size:12px; padding:8px 10px; cursor:pointer; min-height:36px;
  }
  .cchips{display:inline-flex; gap:5px; margin-left:auto}
  .cchips button{
    display:inline-flex; align-items:center; gap:5px;
    background:var(--surface2); border:1px solid var(--line); color:var(--faint);
    font:inherit; font-size:9px; letter-spacing:.06em; padding:3px 8px;
    cursor:pointer; transition:all .12s ease;
  }
  .cchips button:hover{color:var(--text)}
  .cchips button.on{
    color:var(--gold); border-color:rgba(240,185,11,.5);
    background:linear-gradient(180deg, rgba(240,185,11,.14), rgba(240,185,11,.06));
  }
  .cchips .led{width:5px; height:5px; border-radius:50%; background:#33333B; flex:none}
  .cchips button.on .led{background:var(--gold); box-shadow:0 0 5px var(--gold-glow)}
  .card .head .gh{display:flex}
  .card .head .gh .cgear{width:26px; height:26px; font-size:12px}
  .card .head .rm{
    background:none; border:none; color:var(--faint);
    font-size:13px; cursor:pointer; padding:4px 8px;
  }
  .card .head .rm:hover{color:var(--red)}
  .card .box{height:calc(100% - 37px); position:relative}
  body.editing .card{outline:1px dashed rgba(240,185,11,.55)}
  body.editing .card .head{cursor:grab}
  body.editing .card .box{pointer-events:none; opacity:.85}
  .card .rsz{
    position:absolute; right:0; bottom:0; width:18px; height:18px; display:none;
    cursor:nwse-resize; z-index:8;
    background:linear-gradient(135deg, transparent 50%, rgba(240,185,11,.7) 50%);
  }
  body.editing .card .rsz{display:block}
  .card.dragging{outline:1px dashed var(--gold); z-index:20; opacity:.92}
  #empty{
    color:var(--muted); padding:40px 16px; text-align:center;
    border:1px dashed var(--line); background:var(--surface);
  }
  @media(max-width:640px){
    main{padding:16px 12px 40px}
    .topnav{width:100%; margin-left:0}
    #board{position:static}
    .card{position:static !important; width:auto !important; height:380px !important; margin-bottom:14px}
    .card .rsz{display:none !important}
    #editBtn{display:none}
  }

  /* ═══════════════ couche de raffinement ═══════════════ */
  body{
    background:
      radial-gradient(1100px 420px at 50% -180px, rgba(240,185,11,.055), transparent 62%),
      radial-gradient(900px 500px at 50% 118%, rgba(38,166,154,.035), transparent 60%),
      var(--bg);
  }
  ::-webkit-scrollbar{width:9px; height:9px}
  ::-webkit-scrollbar-thumb{background:#26262E; border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#33333D}
  header h1 em{text-shadow:0 0 22px var(--gold-glow)}
  .topnav a{position:relative}
  .topnav a::after{
    content:""; position:absolute; left:10px; right:10px; bottom:3px; height:1px;
    background:var(--gold); transform:scaleX(0); transform-origin:left;
    transition:transform .16s ease;
  }
  .topnav a:hover::after{transform:scaleX(1)}
  .addbar select, #addBtn, #addXr, #editBtn{min-height:36px}
  #addXr{
    background:var(--surface2); border:1px solid var(--line-strong); color:var(--muted);
    font:inherit; font-size:13px; padding:8px 14px; cursor:pointer;
    transition:color .14s ease, border-color .14s ease;
  }
  #addXr:hover{color:var(--gold); border-color:var(--gold-glow)}
  .xrtip{
    position:absolute; z-index:9; background:rgba(14,14,18,.97);
    border:1px solid var(--line-strong); padding:4px 9px; font-size:10px;
    color:var(--text); pointer-events:none; white-space:nowrap;
    box-shadow:0 8px 24px rgba(0,0,0,.55);
  }
  #addBtn{background:linear-gradient(180deg, rgba(240,185,11,.2), rgba(240,185,11,.1))}
  #addBtn:hover{background:linear-gradient(180deg, rgba(240,185,11,.3), rgba(240,185,11,.16))}
  #addBtn:active, #editBtn:active{transform:translateY(1px)}
  .card{
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 14px 34px -18px rgba(0,0,0,.65);
    transition:box-shadow .16s ease;
  }
  .card:hover{box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 18px 44px -18px rgba(0,0,0,.8)}
  .card .head{background:linear-gradient(180deg, rgba(255,255,255,.015), transparent)}
  .card.dragging{box-shadow:0 24px 60px -16px rgba(0,0,0,.85), 0 0 0 1px var(--gold-glow)}
  .card .rsz{
    background:linear-gradient(135deg, transparent 55%, var(--gold) 55%);
    opacity:.55; transition:opacity .12s ease;
  }
  .card .rsz:hover{opacity:1}
  /* la grille d'ancrage se révèle en mode édition (fond posé par JS) */
  body.editing #board{
    outline:1px dashed rgba(240,185,11,.18); outline-offset:8px;
  }
  #empty{letter-spacing:.02em}

  /* ═══════════════ couche premium ═══════════════ */
  html::before, html::after{
    content:""; position:fixed; z-index:-2; border-radius:50%;
    filter:blur(90px); pointer-events:none;
  }
  html::before{
    width:820px; height:520px; top:-260px; left:50%; margin-left:-500px;
    background:radial-gradient(closest-side, rgba(240,185,11,.13), transparent 70%);
    animation:drift1 46s ease-in-out infinite alternate;
  }
  html::after{
    width:760px; height:560px; bottom:-320px; right:-180px;
    background:radial-gradient(closest-side, rgba(38,166,154,.1), transparent 70%);
    animation:drift2 58s ease-in-out infinite alternate;
  }
  @keyframes drift1{from{transform:translate(0,0)} to{transform:translate(140px,60px) scale(1.1)}}
  @keyframes drift2{from{transform:translate(0,0)} to{transform:translate(-120px,-80px) scale(1.08)}}
  body{
    background:
      linear-gradient(rgba(255,255,255,.014) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px),
      radial-gradient(1100px 420px at 50% -180px, rgba(240,185,11,.05), transparent 62%),
      var(--bg);
    background-size:44px 44px, 44px 44px, auto, auto;
  }
  .card{
    background:
      linear-gradient(180deg, #141419, #101014) padding-box,
      linear-gradient(135deg, rgba(240,185,11,.3), rgba(255,255,255,.05) 40%,
                      rgba(38,166,154,.2)) border-box;
    border:1px solid transparent;
  }

  header h1 em{
    background:linear-gradient(100deg, var(--gold) 42%, #FFE9A3 50%, var(--gold) 58%);
    background-size:230% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:shine 7s ease-in-out infinite;
  }
  @keyframes shine{0%, 55%{background-position:120% 0} 85%, 100%{background-position:-40% 0}}
  @media(prefers-reduced-motion:reduce){
    html::before, html::after{animation:none}
    header h1 em{animation:none; color:var(--gold); background:none}
  }
</style>
</head>
<body>
<main>
<header>
  <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
    <g stroke="#F0B90B" stroke-width="6" fill="none">
      <line x1="50" y1="50" x2="50" y2="16"/><line x1="50" y1="50" x2="79" y2="33"/>
      <line x1="50" y1="50" x2="79" y2="67"/><line x1="50" y1="50" x2="50" y2="84"/>
      <line x1="50" y1="50" x2="21" y2="67"/><line x1="50" y1="50" x2="21" y2="33"/>
    </g>
    <circle cx="50" cy="50" r="13" fill="#F0B90B"/>
  </svg>
  <h1>GEX <em>Terminal</em> · <span id="hTitle">Mon dashboard</span></h1>
  <nav class="topnav"><a href="/">← <span id="backLbl">Terminal</span></a></nav>
</header>

<div class="addbar">
  <select id="addT"><option>NQ</option><option>ES</option><option>SPX</option></select>
  <select id="addIv"><option value="1m">1m</option><option value="5m" selected>5m</option><option value="15m">15m</option></select>
  <button id="addBtn">+ <span id="addLbl">Ajouter un chart</span></button>
  <button id="addXr">▦ Heatmap</button>
  <button id="editBtn">✎ <span id="editLbl">Éditer</span></button>
  <select id="tzDash" title="Fuseau horaire des charts">
    <option value="Europe/Paris">Paris</option>
    <option value="America/New_York">New York</option>
    <option value="Europe/London">London</option>
    <option value="UTC">UTC</option>
  </select>
  <span class="ccount" id="ccount"></span>
  <span class="hint" id="hintLbl">Disposition sauvegardée dans ce navigateur.</span>
</div>

<div id="empty" hidden>
  <svg viewBox="0 0 100 100" width="46" height="46" aria-hidden="true" style="opacity:.5;margin-bottom:14px">
    <rect x="10" y="14" width="34" height="24" rx="2" fill="none" stroke="#F0B90B" stroke-width="3"/>
    <rect x="56" y="14" width="34" height="24" rx="2" fill="none" stroke="#26A69A" stroke-width="3"/>
    <rect x="10" y="48" width="34" height="24" rx="2" fill="none" stroke="#8A8A94" stroke-width="3"/>
    <rect x="56" y="48" width="34" height="24" rx="2" fill="none" stroke="#8A8A94" stroke-width="3"/>
  </svg>
  <div class="empty-t">Ton plan de travail est vide</div>
  <div class="empty-s">Ajoute des charts un par un, ou pars d'une disposition prête.</div>
  <div class="presets">
    <button data-preset="focus">◻ Focus NQ</button>
    <button data-preset="triple">▤ NQ · ES · SPX</button>
    <button data-preset="nqmtf">▦ NQ multi-TF</button>
  </div>
</div>
<div id="board"></div>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
const C = {gold:"#F0B90B", muted:"#8A8A94", faint:"#5C5C66", line:"#212127", text:"#ECEAE4",
           teal:"#26A69A", red:"#EF5350"};
const KIND_COLOR = {res:C.teal, sup:C.red, res0:C.teal, sup0:C.red, flip:C.gold, hgex:C.gold,
                    gpos:C.teal, gneg:C.red, emh:C.text, eml:C.text,
                    ivh:C.muted, ivl:C.muted, mpain:C.gold, emb:C.text};
const SHORT = {res:"CW", sup:"PW", res0:"CW0", sup0:"PW0", flip:"Flip", hgex:"HGEX",
               emh:"EM+", eml:"EM−", mpain:"MP"};
const DASH_KINDS = ["flip","emh","eml","res0","sup0","mpain","emb","ivh","ivl"];
const GROUP_KINDS = {
  gex: ["res","sup","res0","sup0","flip","hgex","gpos","gneg","mpain"],
  em:  ["emh","eml","emb","ivh","ivl"],
};
/* PREFS, tzShift, TZ_CITY, CANDLE_PAIRS, PRICE_COLORS : fournis par /ui.js */
let LANG = "fr";
try{ LANG = localStorage.getItem("gexLang") || "fr"; }catch(_){}
const TXT = {
  fr: {title:"Mon dashboard", back:"Terminal", add:"Ajouter un chart",
       hint:"Disposition sauvegardée dans ce navigateur.",
       empty:"Aucun chart pour l'instant — ajoute NQ, ES ou SPX ci-dessus.",
       feedKo:"flux indisponible", edit:"Éditer", done:"Terminé"},
  en: {title:"My dashboard", back:"Terminal", add:"Add a chart",
       hint:"Layout saved in this browser.",
       empty:"No charts yet — add NQ, ES or SPX above.",
       feedKo:"feed unavailable", edit:"Edit", done:"Done"},
};
const tx = k => (TXT[LANG] || TXT.fr)[k];

let CARDS = [];
try{ CARDS = JSON.parse(localStorage.getItem("gexDashCards")||"[]"); }catch(_){}
if (!Array.isArray(CARDS)) CARDS = [];
CARDS.forEach((c, i) => {
  if (c.w == null){ c.x = (i % 2) * 6; c.y = Math.floor(i / 2) * 4; c.w = 6; c.h = 4; }
  if (!c.lv) c.lv = {gex: true, em: true, open: true};
  if (c.lv.xr == null) c.lv.xr = false;
  if (!c.type) c.type = "chart";
  if (!c.id) c.id = "c" + Date.now().toString(36) + i;
  if (!c.colors) c.colors = {up: PREFS.up, dn: PREFS.dn, px: PREFS.px};
});
function saveCards(){ try{ localStorage.setItem("gexDashCards", JSON.stringify(CARDS)); }catch(_){} }

/* ---- plan de travail : grille 12 colonnes, ancrage au lâcher ---- */
const COLS = 12, CELL_H = 82, GAP = 12;
let EDIT = false;
const board = $("board");
function cellW(){ return (board.clientWidth - GAP * (COLS - 1)) / COLS; }
function px(c){
  const cw = cellW();
  return {left: c.x * (cw + GAP), top: c.y * (CELL_H + GAP),
          width: c.w * cw + (c.w - 1) * GAP, height: c.h * CELL_H + (c.h - 1) * GAP};
}
function clampCard(c){
  c.w = Math.max(3, Math.min(COLS, Math.round(c.w)));
  c.h = Math.max(3, Math.round(c.h));
  c.x = Math.max(0, Math.min(COLS - c.w, Math.round(c.x)));
  c.y = Math.max(0, Math.round(c.y));
}
function boardHeight(){
  const rows = CARDS.reduce((m, c) => Math.max(m, c.y + c.h), 0);
  board.style.height = (rows * (CELL_H + GAP) + 40) + "px";
}

const LEVELS_CACHE = {};
async function getLevels(target){
  if (LEVELS_CACHE[target] !== undefined) return LEVELS_CACHE[target];
  try{
    const d = await (await fetch("levels.json?target=" + target + "&t=" + Date.now())).json();
    LEVELS_CACHE[target] = d && !d.error ? d : null;
  }catch(_){ LEVELS_CACHE[target] = null; }
  return LEVELS_CACHE[target];
}

const IVSEC = {"1m":60, "5m":300, "15m":900};
/* ---- chaque carte est INDÉPENDANTE : ses couleurs, ses filtres,
        son timer et ses lignes vivent sur son élément DOM ---- */

function drawGroup(series, pay, grp){
  const lines = [];
  if (!pay) return lines;
  if (grp === "open"){
    if (pay.open_grid){
      lines.push(series.createPriceLine({price: pay.open_grid.anchor, color: C.gold,
        lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Solid,
        axisLabelVisible: true, title: "Daily O"}));
      for (const g of pay.open_grid.levels){
        lines.push(series.createPriceLine({price: g.up, color: "rgba(239,83,80,.5)",
          lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: false, title: ""}));
        lines.push(series.createPriceLine({price: g.down, color: "rgba(38,166,154,.5)",
          lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
          axisLabelVisible: false, title: ""}));
      }
    }
    return lines;
  }
  for (const L of pay.levels || []){
    const g = GROUP_KINDS.gex.includes(L.kind) ? "gex"
            : GROUP_KINDS.em.includes(L.kind) ? "em" : null;
    if (g !== grp) continue;
    lines.push(series.createPriceLine({
      price: L.price_nq, color: KIND_COLOR[L.kind] || C.muted, lineWidth: 1,
      lineStyle: DASH_KINDS.includes(L.kind) ? LightweightCharts.LineStyle.Dashed
                                             : LightweightCharts.LineStyle.Solid,
      axisLabelVisible: ["res","sup","flip","res0","sup0","hgex"].includes(L.kind),
      title: SHORT[L.kind] || "",
    }));
  }
  return lines;
}

function toggleGroup(card, cfg, grp, btn){
  cfg.lv[grp] = !cfg.lv[grp];
  btn.classList.toggle("on", cfg.lv[grp]);
  saveCards();
  if (!card._series) return;
  if (!cfg.lv[grp]){
    (card._lines[grp] || []).forEach(l => { try{ card._series.removePriceLine(l); }catch(_){} });
    card._lines[grp] = [];
  } else {
    card._lines[grp] = drawGroup(card._series, card._pay, grp);
  }
}

  btn.textContent = "⚙";
  btn.title = "Réglages de ce chart";
  gh.appendChild(btn);
  const panel = document.createElement("div");
  panel.className = "cpanel";
  panel.hidden = true;
  host.querySelector(".box").appendChild(panel);

  function renderPanel(){
    const pairs = CANDLE_PAIRS.map(([a, b], k) =>
      `<button class="dsw pair${cfg.colors.up===a && cfg.colors.dn===b ? " on" : ""}"
        style="--a:${a};--b:${b}" data-pair="${k}"></button>`).join("");
    const prices = PRICE_COLORS.map(c =>
      `<button class="dsw${cfg.colors.px===c ? " on" : ""}" style="background:${c}" data-px="${c}"></button>`).join("");
    panel.innerHTML = `
      <div class="cp-head"><b>${cfg.t} · ${cfg.iv}</b><button class="cp-x">✕</button></div>
      <div class="cp-row"><span>Palette</span><span class="cp-sw">${pairs}</span></div>
      <div class="cp-row"><span>Corps ↑</span><input type="color" data-k="up" value="${cfg.colors.up}"></div>
      <div class="cp-row"><span>Corps ↓</span><input type="color" data-k="dn" value="${cfg.colors.dn}"></div>
      <div class="cp-row"><span>Prix</span><span class="cp-sw">${prices}<input type="color" data-k="px" value="${cfg.colors.px}"></span></div>
      <button class="cp-rst">↺ Réinitialiser</button>`;
    const apply = () => {
      host._series.applyOptions({upColor: cfg.colors.up, downColor: cfg.colors.dn,
        wickUpColor: cfg.colors.up, wickDownColor: cfg.colors.dn,
        priceLineColor: cfg.colors.px});
      saveCards();
    };
    panel.querySelector(".cp-x").onclick = () => { panel.hidden = true; };
    panel.querySelectorAll("[data-pair]").forEach(b => b.onclick = () => {
      const [a, c2] = CANDLE_PAIRS[+b.dataset.pair];
      cfg.colors.up = a; cfg.colors.dn = c2; apply(); renderPanel();
    });
    panel.querySelectorAll("[data-px]").forEach(b => b.onclick = () => {
      cfg.colors.px = b.dataset.px; apply(); renderPanel();
    });
    panel.querySelectorAll("input[data-k]").forEach(inp => inp.oninput = () => {
      cfg.colors[inp.dataset.k] = inp.value; apply();
    });
    panel.querySelector(".cp-rst").onclick = () => {
      cfg.colors = {up: "#26A69A", dn: "#EF5350", px: "#FFD84D"};
      apply(); renderPanel();
    };
  }
  btn.onclick = () => {
    if (panel.hidden){ renderPanel(); panel.hidden = false; }
    else panel.hidden = true;
  };
}

/* Heatmap GEX par strike : bandes horizontales sous les bougies.
   Vert = gamma positif (aimant), rouge = négatif (accélérant),
   opacité = magnitude relative au strike dominant. */
function bandHalf(series, prof){
  const gaps = [];
  for (let i = 1; i < prof.length; i++){
    const a = series.priceToCoordinate(prof[i - 1][0]);
    const b = series.priceToCoordinate(prof[i][0]);
    if (a != null && b != null) gaps.push(Math.abs(b - a));
  }
  if (!gaps.length) return 4;
  gaps.sort((x, y) => x - y);
  return Math.max(1.5, Math.min(10, gaps[Math.floor(gaps.length / 2)] / 2 - 0.6));
}
/* Style X-Ray THE HUB : échelle par PERCENTILES (immunisée aux walls
   géants qui écrasaient tout), rangées de points RONDS dont le diamètre,
   la densité et l'alpha portent le rang d'exposition, halo lumineux sur
   le top décile. rk(g) -> rang [0..1] dans la distribution du jour. */
/* Séparateurs de session sur les cartes chart (canvas sous les bougies) */
function drawSess(host){
  const cv = host._heat, chart = host._chart;
  if (!cv || !chart) return;
  const box = host.querySelector(".box");
  const w = box.clientWidth, h = box.clientHeight, dpr = window.devicePixelRatio || 1;
  if (cv.width !== Math.round(w * dpr) || cv.height !== Math.round(h * dpr)){
    cv.width = Math.round(w * dpr); cv.height = Math.round(h * dpr);
    cv.style.width = w + "px"; cv.style.height = h + "px";
  }
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  drawSessionLines(ctx, chart, host._times, w, h);
}

/* ═══ MODULE HEATMAP X-RAY : carte dédiée, sans bougies.
   Cellules continues temps × strike (vert = gamma+, rouge = gamma-,
   intensité = magnitude, échelle racine), ligne de prix par-dessus,
   axes, tooltip au survol. Données : /api/xr + /api/quote. ═══ */
async function mountXrCard(cfg, host){
  const box = host.querySelector(".box"), note = host.querySelector(".n");
  const cv = document.createElement("canvas");
  cv.style.cssText = "position:absolute;inset:0";
  box.appendChild(cv);
  const tip = document.createElement("div");
  tip.className = "xrtip";
  tip.hidden = true;
  box.appendChild(tip);
  const ctx = cv.getContext("2d");
  const st = {snaps: [], path: [], live: null, geo: null};

  function snapSecOf(snaps){
    if (snaps.length < 2) return 900;
    const d = [];
    for (let i = 1; i < snaps.length; i++) d.push(snaps[i].t - snaps[i - 1].t);
    d.sort((a, b) => a - b);
    return d[Math.floor(d.length / 2)];
  }
  function draw(){
    const W = box.clientWidth, H = box.clientHeight, dpr = window.devicePixelRatio || 1;
    if (!W || !H) return;
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + "px"; cv.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.font = "9px IBM Plex Mono, monospace";
    if (!st.snaps.length){
      ctx.fillStyle = "#5C5C66";
      ctx.textAlign = "center";
      ctx.fillText("En attente de snapshots X-Ray (1 toutes les 15 min en séance)", W / 2, H / 2);
      ctx.textAlign = "left";
      st.geo = null;
      return;
    }
    const AXR = 56, AXB = 18, PW = W - AXR, PH = H - AXB;
    /* domaine ancré sur le PRIX du jour, pas sur toute la chaîne de strikes :
       c'est ce qui donne des cellules épaisses et une courbe lisible */
    const ps = st.path.map(q => q.p);
    const base = ps.length ? ps[ps.length - 1]
               : (st.snaps[st.snaps.length - 1].px || st.snaps[0].prof[0][0]);
    let plo = ps.length ? Math.min(...ps) : base;
    let phi = ps.length ? Math.max(...ps) : base;
    const marg = Math.max((phi - plo) * 0.6, base * 0.008);
    let lo = plo - marg, hi = phi + marg;
    if (hi - lo < base * 0.02){
      const c = (hi + lo) / 2;
      lo = c - base * 0.01; hi = c + base * 0.01;
    }
    const t0 = st.snaps[0].t;
    const t1 = Math.max(st.snaps[st.snaps.length - 1].t + 900,
                        st.live ? st.live.t : 0);
    const X = t => (t - t0) / Math.max(1, t1 - t0) * PW;
    const Y = p => (hi - p) / (hi - lo) * PH;
    /* pas d'affichage strike par strike : on AGRÈGE la chaîne en ~34 rangées
       épaisses (somme du GEX par bucket), comme la maquette validée */
    const k0 = st.snaps[st.snaps.length - 1].prof.map(p => p[0]);
    let rawStep = 25;
    if (k0.length > 1){
      const gaps = [];
      for (let i = 1; i < k0.length; i++) gaps.push(k0[i] - k0[i - 1]);
      gaps.sort((a, b) => a - b);
      rawStep = gaps[Math.floor(gaps.length / 2)] || 25;
    }
    const span = hi - lo;
    const dispStep = Math.max(1, Math.round(span / 34 / rawStep)) * rawStep;
    const rowh = dispStep / span * PH;
    const buckets = st.snaps.map(s => {
      const b = {};
      for (const [k, g] of s.prof){
        if (k < lo - dispStep || k > hi + dispStep) continue;
        const idx = Math.floor((k - lo) / dispStep);
        b[idx] = (b[idx] || 0) + g;
      }
      return b;
    });
    const maxA = Math.max(...buckets.flatMap(b => Object.values(b).map(Math.abs)), 0) || 1;
    const xs = st.snaps.map(s => X(s.t));
    xs.push(X(st.snaps[st.snaps.length - 1].t + snapSecOf(st.snaps)));
    for (let i = 0; i < buckets.length; i++){
      const x0 = xs[i], x1 = xs[i + 1];
      if (x1 <= 0 || x0 >= PW) continue;
      for (const idx of Object.keys(buckets[i])){
        const v = buckets[i][idx];
        const r = Math.abs(v) / maxA;
        if (r < 0.02) continue;
        const a = Math.min(1, 0.08 + 0.85 * Math.sqrt(r));
        ctx.fillStyle = v >= 0 ? `rgba(34,197,168,${a})` : `rgba(242,82,78,${a})`;
        const ytop = Y(lo + (Number(idx) + 1) * dispStep);
        ctx.fillRect(Math.max(0, x0), ytop, Math.min(PW, x1) - Math.max(0, x0) + 0.5,
                     Math.max(1, rowh - 1));
      }
    }
    for (let i = 0; i <= 6; i++){                        /* grille + axe prix */
      const p = lo + (hi - lo) * i / 6, y = Y(p);
      ctx.fillStyle = "rgba(255,255,255,.05)";
      ctx.fillRect(0, y, PW, 1);
      ctx.fillStyle = "#6E6E78";
      ctx.fillText(Math.round(p).toLocaleString("fr-FR"), PW + 6, y + 3);
    }
    ctx.fillStyle = "#6E6E78";                           /* axe temps */
    for (let i = 0; i <= 4; i++){
      const tt = t0 + (t1 - t0) * i / 4;
      const d = new Date(tzShift(tt) * 1000);
      const lab = String(d.getUTCHours()).padStart(2, "0") + ":"
                + String(d.getUTCMinutes()).padStart(2, "0");
      ctx.fillText(lab, Math.min(PW - 32, Math.max(2, X(tt) - 12)), H - 5);
    }
    if (st.path.length > 1){                             /* ligne de prix */
      ctx.strokeStyle = "#F0EEE8";
      ctx.lineWidth = 1.8;
      ctx.lineJoin = "round";
      ctx.beginPath();
      st.path.forEach((q, i) => {
        const x = X(q.t), y = Y(q.p);
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });
      ctx.stroke();
      const last = st.path[st.path.length - 1];
      const lx = X(last.t), ly = Y(last.p);
      ctx.fillStyle = "#F0B90B";
      ctx.beginPath(); ctx.arc(lx, ly, 3, 0, 7); ctx.fill();
      ctx.fillRect(PW, ly - 8, AXR, 16);
      ctx.fillStyle = "#0A0A0C";
      ctx.fillText(Math.round(last.p).toLocaleString("fr-FR"), PW + 5, ly + 3);
    }
    st.geo = {X, Y, lo, hi, t0, t1, PW, PH, step: dispStep};
  }

  async function loadXr(){
    try{
      const r = await fetch(`/api/xr?target=${cfg.t}`);
      const d = await r.json();
      st.snaps = (d.snaps || []).filter(s => s.prof && s.prof.length);
      st.path = st.snaps.filter(s => s.px != null).map(s => ({t: s.t, p: s.px}));
      if (st.live) st.path.push(st.live);
      note.textContent = st.snaps.length ? `${st.snaps.length} snap${st.snaps.length > 1 ? "s" : ""}` : "";
    }catch(_){}
    draw();
  }

  box.addEventListener("pointermove", e => {             /* tooltip */
    const g = st.geo;
    if (!g){ tip.hidden = true; return; }
    const r = box.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    if (x > g.PW || y > g.PH){ tip.hidden = true; return; }
    const tt = g.t0 + x / g.PW * (g.t1 - g.t0);
    let s = st.snaps[0];
    for (const q of st.snaps){ if (q.t <= tt) s = q; else break; }
    const price = g.hi - y / g.PH * (g.hi - g.lo);
    let best = null;
    for (const row of s.prof)
      if (!best || Math.abs(row[0] - price) < Math.abs(best[0] - price)) best = row;
    if (!best || Math.abs(best[0] - price) > g.step){ tip.hidden = true; return; }
    const gv = best[1];
    const gtxt = Math.abs(gv) >= 1 ? gv.toFixed(2) + " Bn$"
                                   : Math.round(gv * 1000) + " M$";
    const d = new Date(tzShift(s.t) * 1000);
    tip.textContent = `Strike ${Math.round(best[0]).toLocaleString("fr-FR")}`
      + ` · GEX ${gv >= 0 ? "+" : ""}${gtxt}`
      + ` · ${String(d.getUTCHours()).padStart(2, "0")}:${String(d.getUTCMinutes()).padStart(2, "0")}`;
    tip.style.left = Math.min(x + 12, box.clientWidth - 240) + "px";
    tip.style.top = Math.max(6, y - 28) + "px";
    tip.hidden = false;
  });
  box.addEventListener("pointerleave", () => { tip.hidden = true; });

  new ResizeObserver(draw).observe(box);
  loadXr();
  host._timer = setInterval(loadXr, 60000);
  host._timer2 = setInterval(async () => {               /* prix live */
    if (document.hidden) return;
    try{
      const r = await fetch(`/api/quote?target=${cfg.t}`);
      const d = await r.json();
      if (d.price == null) return;
      st.live = {t: Math.floor(d.time || Date.now() / 1000), p: d.price};
      if (!st.path.length) return;
      const lastP = st.path[st.path.length - 1];
      if (st.live.t > lastP.t + 20) st.path.push(st.live);
      else st.path[st.path.length - 1] = {t: lastP.t, p: d.price};
      draw();
    }catch(_){}
  }, 2000);
}

async function mountCard(cfg, host){
  const box = host.querySelector(".box"), note = host.querySelector(".n");
  const heat = document.createElement("canvas");
  heat.style.cssText = "position:absolute;inset:0;pointer-events:none;z-index:0";
  box.appendChild(heat);                       // AVANT le chart -> rendu dessous
  host._heat = heat;
  const chart = LightweightCharts.createChart(box, {
    layout:{background:{type:"solid", color:"transparent"}, textColor:C.muted,
            fontFamily:"IBM Plex Mono, monospace", fontSize:10},
    grid:{vertLines:{color:"rgba(255,255,255,.03)"}, horzLines:{color:"rgba(255,255,255,.03)"}},
    crosshair:{mode: LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:C.line},
    timeScale:{borderColor:C.line, timeVisible:true, secondsVisible:false},
  });
  const series = chart.addCandlestickSeries({
    upColor: cfg.colors.up, downColor: cfg.colors.dn, borderVisible: false,
    wickUpColor: cfg.colors.up, wickDownColor: cfg.colors.dn,
    priceLineColor: cfg.colors.px, priceLineWidth: 2,
    priceLineStyle: LightweightCharts.LineStyle.Dashed,
  });
  host._chart = chart; host._series = series; host._lines = {}; host._pay = null;
  chart.timeScale().subscribeVisibleLogicalRangeChange(() => drawSess(host));
  new ResizeObserver(() => {
    chart.applyOptions({width: box.clientWidth, height: box.clientHeight});
    drawSess(host);
  }).observe(box);
  buildCardPanel(host, cfg);

  let lastBar = null;
  try{
    const r = await fetch(`/api/chart?target=${cfg.t}&interval=${cfg.iv}`);
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || r.status);
    const bars = d.bars.map(b => ({...b, time: tzShift(b.time)}));
    series.setData(bars);
    lastBar = bars[bars.length - 1] || null;
    if (bars.length){
      const nView = {"1m": 180, "5m": 150, "15m": 120}[cfg.iv] || 150;
      chart.timeScale().setVisibleLogicalRange({
        from: Math.max(0, bars.length - nView), to: bars.length + 6});
    } else chart.timeScale().fitContent();
    note.textContent = TZ_CITY[PREFS.tz] || PREFS.tz;
    host._draw = attachDrawTools(box, chart, series,
                                 "gexDraw:card:" + cfg.id, IVSEC[cfg.iv]);
    if (bars.length) host._draw.setBars(bars.map(b => b.time), IVSEC[cfg.iv]);
    host._times = bars.map(b => b.time);
    host._ivSec = IVSEC[cfg.iv];
  }catch(e){ note.textContent = tx("feedKo"); return; }

  host._pay = await getLevels(cfg.t);
  for (const grp of ["gex", "em", "open"])
    if (cfg.lv[grp]) host._lines[grp] = drawGroup(series, host._pay, grp);
  drawSess(host);

  const tick = async () => {
    if (document.hidden || !lastBar) return;
    try{
      const r = await fetch(`/api/quote?target=${cfg.t}`);
      const d = await r.json();
      if (!r.ok || d.price == null) return;
      const sec = IVSEC[cfg.iv], p = d.price;
      const bucket = Math.floor(tzShift(d.time || Date.now()/1000) / sec) * sec;
      if (bucket > lastBar.time){
        if (host._anim) cancelAnimationFrame(host._anim);
        host._anim = null;
        lastBar = {time:bucket, open:p, high:p, low:p, close:p};
        series.update(lastBar);
      } else {
        animatePrice(host, series, lastBar, p, 900);
      }
      if (host._draw) host._draw.pushTime(lastBar.time);
      if (host._times && lastBar.time > host._times[host._times.length - 1])
        host._times.push(lastBar.time);
    }catch(_){}
  };
  // départ décalé par carte : pas de rafale simultanée quand la grille est pleine
  const offset = (Array.prototype.indexOf.call(board.children, host) % 8) * 250;
  host._timer = null;
  setTimeout(() => { if (host.isConnected){ tick(); host._timer = setInterval(tick, 2000); } }, offset);
}

function wireEdit(card, cfg){
  const handle = document.createElement("div");
  handle.className = "rsz";
  card.appendChild(handle);

  function startDrag(ev, mode){
    if (!EDIT) return;
    ev.preventDefault();
    card.classList.add("dragging");
    const cw = cellW();
    const startX = ev.clientX, startY = ev.clientY;
    const orig = {...cfg};
    function move(e){
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (mode === "move"){
        cfg.x = orig.x + dx / (cw + GAP);
        cfg.y = orig.y + dy / (CELL_H + GAP);
      } else {
        cfg.w = orig.w + dx / (cw + GAP);
        cfg.h = orig.h + dy / (CELL_H + GAP);
      }
      const p = px({x:Math.max(0,cfg.x), y:Math.max(0,cfg.y),
                    w:Math.max(3,cfg.w), h:Math.max(3,cfg.h)});
      Object.assign(card.style, {left:p.left+"px", top:p.top+"px",
                                 width:p.width+"px", height:p.height+"px"});
    }
    function up(){
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      card.classList.remove("dragging");
      clampCard(cfg);        // ancrage : snap sur la grille
      saveCards();
      layoutCard(card, cfg);
      boardHeight();
    }
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  }
  card.querySelector(".head").addEventListener("pointerdown", e => {
    if (e.target.tagName !== "BUTTON") startDrag(e, "move");
  });
  handle.addEventListener("pointerdown", e => startDrag(e, "resize"));
}

function layoutCard(card, cfg){
  const p = px(cfg);
  Object.assign(card.style, {left:p.left+"px", top:p.top+"px",
                             width:p.width+"px", height:p.height+"px"});
}

function render(){
  for (const el of Array.from(board.children)){
    if (el._timer) clearInterval(el._timer);
    if (el._timer2) clearInterval(el._timer2);
    if (el._anim) cancelAnimationFrame(el._anim);
    try{ el._chart && el._chart.remove(); }catch(_){}
  }
  board.innerHTML = "";
  $("empty").hidden = CARDS.length > 0;
  const emptyT = $("empty").querySelector(".empty-t");
  if (emptyT) emptyT.textContent = tx("empty");
  CARDS.forEach((cfg, idx) => {
    clampCard(cfg);
    const card = document.createElement("div");
    card.className = "card";
    if (cfg.type === "xr"){
      card.innerHTML = `<div class="head"><span class="t">${cfg.t} · X-RAY</span>
        <span class="n"></span>
        <span class="gh"></span><button class="rm" title="Retirer">✕</button></div>
        <div class="box"></div>`;
      card.querySelector(".rm").onclick = () => {
        if (card._timer) clearInterval(card._timer);
        if (card._timer2) clearInterval(card._timer2);
        CARDS.splice(idx, 1); saveCards(); render();
      };
      board.appendChild(card);
      layoutCard(card, cfg);
      wireEdit(card, cfg);
      mountXrCard(cfg, card);
      return;
    }
    card.innerHTML = `<div class="head"><span class="t">${cfg.t} · ${cfg.iv}</span>
      <span class="n"></span>
      <span class="cchips">
        <button data-g="gex"><i class="led"></i>GEX</button>
        <button data-g="em"><i class="led"></i>EM</button>
        <button data-g="open"><i class="led"></i>Open</button>
      </span>
      <span class="gh"></span><button class="rm" title="Retirer">✕</button></div>
      <div class="box"></div>`;
    card.querySelectorAll(".cchips button").forEach(b => {
      b.classList.toggle("on", !!cfg.lv[b.dataset.g]);
      b.onclick = () => toggleGroup(card, cfg, b.dataset.g, b);   // CETTE carte uniquement
    });
    card.querySelector(".rm").onclick = () => {
      if (card._timer) clearInterval(card._timer);
      try{ card._chart && card._chart.remove(); }catch(_){}
      CARDS.splice(idx, 1); saveCards(); render();
    };
    board.appendChild(card);
    layoutCard(card, cfg);
    wireEdit(card, cfg);
    mountCard(cfg, card);
  });
  boardHeight();
  updateCount();
}

function firstFreeSpot(w, h){
  for (let y = 0; y < 60; y++)
    for (let x = 0; x <= COLS - w; x++){
      const clash = CARDS.some(c => x < c.x + c.w && x + w > c.x && y < c.y + c.h && y + h > c.y);
      if (!clash) return {x, y};
    }
  return {x: 0, y: 0};
}

  const spot = firstFreeSpot(6, 4);
  CARDS.push({type: "xr", t: $("addT").value, iv: "15m",
              x: spot.x, y: spot.y, w: 6, h: 4,
              id: "c" + Date.now().toString(36) + Math.floor(Math.random() * 1e4),
              lv: {gex: true, em: true, open: true, xr: false},
              colors: {up: PREFS.up, dn: PREFS.dn, px: PREFS.px}});
  saveCards(); render();
};

function paintBoardGrid(){
  if (EDIT){
    const cw = cellW();
    board.style.backgroundImage =
      "radial-gradient(circle, rgba(240,185,11,.22) 1px, transparent 1.6px)";
    board.style.backgroundSize = (cw + GAP) + "px " + (CELL_H + GAP) + "px";
    board.style.backgroundPosition = "-" + (GAP/2) + "px -" + (GAP/2) + "px";
  } else {
    board.style.backgroundImage = "";
  }
}

const PRESETS = {
  focus:  [{t:"NQ", iv:"5m",  x:0, y:0, w:12, h:6}],
  triple: [{t:"NQ", iv:"5m", x:0, y:0, w:6, h:5}, {t:"ES", iv:"5m", x:6, y:0, w:6, h:5},
           {t:"SPX", iv:"5m", x:0, y:5, w:12, h:4}],
  nqmtf:  [{t:"NQ", iv:"1m", x:0, y:0, w:6, h:5}, {t:"NQ", iv:"5m", x:6, y:0, w:6, h:5},
           {t:"NQ", iv:"15m", x:0, y:5, w:12, h:4}],
};
function applyPreset(name){
  const p = PRESETS[name]; if (!p) return;
  CARDS = p.map((c, i) => ({...c,
    id: "c" + Date.now().toString(36) + i,
    lv: {gex: true, em: true, open: true},
    colors: {up: PREFS.up, dn: PREFS.dn, px: PREFS.px}}));
  saveCards(); render();
}
document.querySelectorAll(".presets [data-preset]").forEach(b =>
  b.onclick = () => applyPreset(b.dataset.preset));

function updateCount(){
  const c = $("ccount");
  if (c) c.textContent = CARDS.length ? `${CARDS.length} chart${CARDS.length > 1 ? "s" : ""}` : "";
}

const tzD = $("tzDash");
tzD.value = PREFS.tz;
tzD.onchange = () => { PREFS.tz = tzD.value; savePrefs(); render(); };
$("editBtn").onclick = () => {
  EDIT = !EDIT;
  document.body.classList.toggle("editing", EDIT);
  $("editBtn").classList.toggle("on", EDIT);
  $("editLbl").textContent = EDIT ? tx("done") : tx("edit");
  paintBoardGrid();
};
window.addEventListener("resize", () => {
  CARDS.forEach((cfg, i) => {
    const card = board.children[i];
    if (card) layoutCard(card, cfg);
  });
  boardHeight();
  paintBoardGrid();
});
if (typeof LightweightCharts === "undefined"){
  $("empty").hidden = false; $("empty").textContent = tx("feedKo");
} else {
  render();
}
</script>
</body>
</html>
