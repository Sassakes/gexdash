<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GEX Terminal — NQ · ES · SPX</title>
<meta name="description" content="Niveaux gamma quotidiens (walls, flip, expected move) pour NQ, ES et SPX.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#0A0A0C; --surface:#111114; --surface2:#16161A;
    --line:#212127; --line-strong:#2B2B33;
    --text:#ECEAE4; --muted:#8A8A94; --faint:#5C5C66;
    --gold:#F0B90B; --gold-soft:rgba(240,185,11,.13); --gold-glow:rgba(240,185,11,.32);
    --teal:#26A69A; --red:#EF5350;
    --mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --disp:"Space Grotesk", var(--mono);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{scrollbar-color:var(--line-strong) var(--bg)}
  body{
    background:
      radial-gradient(1100px 420px at 50% -180px, rgba(240,185,11,.055), transparent 62%),
      var(--bg);
    color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:""; position:fixed; inset:0 0 auto 0; height:1px; z-index:10;
    background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
  }
  main{max-width:880px; margin:0 auto; padding:26px 20px 56px}
  ::selection{background:var(--gold-soft); color:var(--gold)}
  a{color:var(--gold)}
  button, input{font-family:var(--mono)}

  /* ============ header ============ */
  header{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding-bottom:18px; margin-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .mark{width:30px; height:30px; flex:none}
  .brand{display:flex; flex-direction:column; gap:1px; margin-right:4px}
  .brand h1{
    font-family:var(--disp); font-size:16px; font-weight:700;
    letter-spacing:.22em; color:var(--text); text-transform:uppercase; white-space:nowrap;
  }
  .brand h1 em{font-style:normal; color:var(--gold)}
  .brand .sub{font-size:10.5px; color:var(--faint); letter-spacing:.08em}
  #statusPill{
    display:inline-flex; align-items:center; gap:7px;
    border:1px solid var(--line-strong); background:var(--surface);
    padding:5px 12px; font-size:11px; letter-spacing:.06em; color:var(--muted);
    white-space:nowrap;
  }
  #statusPill .dot{width:6px; height:6px; border-radius:50%; background:var(--faint); flex:none}
  #statusPill.live{border-color:rgba(240,185,11,.45); color:var(--gold)}
  #statusPill.live .dot{background:var(--gold); box-shadow:0 0 8px var(--gold-glow)}
  @media(prefers-reduced-motion:no-preference){
    #statusPill.live .dot{animation:pulse 2.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  }
  .refresh{display:flex; margin-left:auto; border:1px solid var(--line-strong); background:var(--surface)}
  .refresh input{
    background:transparent; border:none; border-right:1px solid var(--line);
    color:var(--text); font-size:12px; padding:8px 10px; width:112px;
  }
  .refresh input::placeholder{color:var(--faint)}
  .refresh input:focus-visible{outline:2px solid var(--gold); outline-offset:-2px}
  #refreshBtn{
    background:var(--gold-soft); color:var(--gold); border:none;
    font-size:12px; font-weight:500; padding:8px 16px; cursor:pointer;
    transition:background .12s ease;
  }
  #refreshBtn:hover{background:rgba(240,185,11,.24)}
  #refreshBtn:disabled{opacity:.5; cursor:wait}
  #refreshBtn:focus-visible{outline:2px solid var(--gold); outline-offset:-2px}
  #liveErr{width:100%; color:var(--red); font-size:12px; padding-top:8px; display:none}

  /* ============ tabs ============ */
  .tabs{display:inline-flex; border:1px solid var(--line-strong); background:var(--surface); margin-bottom:16px}
  .tabs button{
    position:relative; background:transparent; color:var(--muted); border:none;
    border-right:1px solid var(--line); padding:8px 26px; font-size:12.5px;
    letter-spacing:.04em; cursor:pointer; transition:color .12s ease;
  }
  .tabs button:last-child{border-right:none}
  .tabs button:hover{color:var(--text)}
  .tabs button:focus-visible{outline:2px solid var(--gold); outline-offset:-2px}
  .tabs button.on{color:var(--gold); font-weight:600; background:var(--gold-soft)}
  .tabs button.on::after{
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--gold);
  }

  /* ============ stat strip ============ */
  .stats{
    display:grid; grid-template-columns:minmax(190px, 1.4fr) repeat(5, 1fr);
    border:1px solid var(--line); background:var(--surface); margin-bottom:16px;
  }
  .cell{
    padding:12px 16px 11px; border-right:1px solid var(--line);
    display:flex; flex-direction:column; gap:2px; min-width:0;
  }
  .cell:last-child{border-right:none}
  .cell .lbl{
    font-family:var(--disp); font-size:9.5px; font-weight:600; letter-spacing:.18em;
    text-transform:uppercase; color:var(--faint); white-space:nowrap;
  }
  .cell .val{font-size:14px; font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap}
  .cell.price .val{font-size:26px; line-height:1.15; color:var(--gold); letter-spacing:-.01em}
  .cell .val.pos{color:var(--teal)} .cell .val.neg{color:var(--red)}
  @media(max-width:760px){
    .stats{grid-template-columns:repeat(3, 1fr)}
    .cell.price{grid-column:1 / -1}
  }

  /* ============ panels ============ */
  .panel{
    background:linear-gradient(180deg, #131317, #101013);
    border:1px solid var(--line); margin-bottom:16px;
  }
  .panel > h2{
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
    font-family:var(--disp); font-size:10px; font-weight:600; letter-spacing:.2em;
    text-transform:uppercase; color:var(--muted);
    padding:11px 16px; border-bottom:1px solid var(--line);
  }
  .panel > h2::before{content:"▪"; color:var(--gold); margin-right:8px; font-size:8px}
  .panel > h2 .note{font-family:var(--mono); letter-spacing:0; text-transform:none; font-weight:400; font-size:11px; color:var(--faint)}
  .pad{padding:14px 16px}

  /* ============ chart ============ */
  .chartbox{height:400px; position:relative}
  .chartbox .src{
    position:absolute; right:10px; top:8px; z-index:3; font-size:10px;
    color:var(--faint); pointer-events:none;
  }
  .ivs{display:inline-flex; border:1px solid var(--line); margin-left:auto}
  .ivs button{
    background:transparent; color:var(--faint); border:none;
    border-right:1px solid var(--line); padding:3px 10px; font-size:10.5px;
    cursor:pointer; letter-spacing:.04em; font-family:var(--mono);
  }
  .ivs button:last-child{border-right:none}
  .ivs button.on{color:var(--gold); background:var(--gold-soft)}
  .ivs button:focus-visible{outline:2px solid var(--gold); outline-offset:-2px}

  /* ============ rail ============ */
  #rail svg{display:block; width:100%; height:auto}

  /* ============ table ============ */
  table{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums}
  thead th{
    font-family:var(--disp); font-size:9.5px; font-weight:600; letter-spacing:.16em;
    text-transform:uppercase; color:var(--faint); text-align:left;
    padding:9px 16px; border-bottom:1px solid var(--line);
  }
  thead th:not(:first-child){text-align:right}
  td{padding:7px 16px; border-bottom:1px solid var(--line); font-size:12.5px}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .1s ease}
  tbody tr:hover{background:rgba(255,255,255,.018)}
  td.price{font-weight:600; text-align:right; white-space:nowrap}
  td.dist{color:var(--muted); text-align:right; white-space:nowrap; width:92px; font-size:11.5px}
  .tick{display:inline-block; width:8px; height:8px; margin-right:9px; vertical-align:baseline; border:1.5px solid currentColor}
  .k-res{color:var(--teal)} .k-sup{color:var(--red)} .k-flip{color:var(--gold)}
  .k-res0{color:var(--teal); opacity:.75} .k-sup0{color:var(--red); opacity:.75}
  .k-gpos{color:var(--teal); opacity:.55} .k-gneg{color:var(--red); opacity:.55}
  .k-emh,.k-eml{color:var(--text); opacity:.85} .k-emb{color:var(--text); opacity:.55}
  .k-ivh,.k-ivl{color:var(--muted)} .k-mpain{color:var(--gold); opacity:.75}
  .k-flip .tick, .k-mpain .tick{transform:rotate(45deg)}
  .k-res .tick, .k-res0 .tick, .k-gpos .tick{background:currentColor}
  .k-sup .tick, .k-sup0 .tick, .k-gneg .tick{background:currentColor}

  /* ============ two-column EM / Pine ============ */
  .duo{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  @media(max-width:820px){.duo{grid-template-columns:1fr}}
  .duo .panel{margin-bottom:0}
  .em-band{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--surface2); border:1px solid var(--line); padding:12px 14px; margin-bottom:12px;
  }
  .em-band .v{font-size:17px; font-weight:600; font-variant-numeric:tabular-nums}
  .em-band .up{color:var(--teal)} .em-band .dn{color:var(--red)}
  .em-mid{text-align:center; color:var(--muted); font-size:11px}
  .em-mid b{color:var(--gold); font-size:14px; display:block}
  .em-sub{color:var(--muted); font-size:11.5px; padding:2px 0; font-variant-numeric:tabular-nums}
  .em-sub .dn{color:var(--red)} .em-sub .up{color:var(--teal)}
  #pineStr{
    background:var(--surface2); border:1px solid var(--line); padding:11px 12px;
    font-size:10.5px; line-height:1.7; color:var(--muted); word-break:break-all;
    max-height:118px; overflow:auto; margin-bottom:12px;
  }
  #copyBtn{
    width:100%; background:var(--gold-soft); color:var(--gold);
    border:1px solid var(--gold); font-size:12px; font-weight:500;
    padding:9px 14px; cursor:pointer; transition:background .12s ease;
  }
  #copyBtn:hover{background:rgba(240,185,11,.24)}
  #copyBtn:focus-visible{outline:2px solid var(--gold); outline-offset:2px}

  /* ============ states / footer ============ */
  #status{
    color:var(--muted); padding:36px 0; text-align:center;
    border:1px dashed var(--line); background:var(--surface);
  }
  footer{
    margin-top:26px; padding-top:14px; border-top:1px solid var(--line);
    color:var(--faint); font-size:11px; line-height:1.7;
    display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  footer a{color:var(--faint); text-decoration:none}
  footer a:hover{color:var(--gold)}
  @media(prefers-reduced-motion:no-preference){
    .panel, .stats{animation:rise .28s ease-out both}
    @keyframes rise{from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:none}}
  }
</style>
</head>
<body>
<main>

<header>
  <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
    <g stroke="#F0B90B" stroke-width="6" fill="none">
      <line x1="50" y1="50" x2="50" y2="16"/><line x1="50" y1="50" x2="79" y2="33"/>
      <line x1="50" y1="50" x2="79" y2="67"/><line x1="50" y1="50" x2="50" y2="84"/>
      <line x1="50" y1="50" x2="21" y2="67"/><line x1="50" y1="50" x2="21" y2="33"/>
    </g>
    <circle cx="50" cy="50" r="13" fill="#F0B90B"/>
  </svg>
  <div class="brand">
    <h1>GEX <em>Terminal</em></h1>
    <span class="sub" id="hdrDate">—</span>
  </div>
  <span id="statusPill"><span class="dot"></span><span id="statusTxt">SNAPSHOT</span></span>
  <div class="refresh">
    <input id="basisIn" inputmode="decimal" placeholder="basis (opt.)"
           title="Basis manuelle, ex: 145.5 — vide = basis marché">
    <button id="refreshBtn">⟳ Refresh</button>
  </div>
  <span id="liveErr"></span>
</header>

<div class="tabs" id="tabs" role="tablist">
  <button data-t="NQ" role="tab">NQ</button>
  <button data-t="ES" role="tab">ES</button>
  <button data-t="SPX" role="tab">SPX</button>
</div>

<div id="status">Chargement…</div>

<div id="app" style="display:none">
  <div class="stats" id="badges"></div>

  <section class="panel" id="chartPanel">
    <h2>Chart · niveaux GEX superposés
      <span class="note" id="chartNote"></span>
      <span class="ivs" id="ivs">
        <button data-iv="1m">1m</button>
        <button data-iv="5m" class="on">5m</button>
        <button data-iv="15m">15m</button>
      </span>
    </h2>
    <div class="chartbox" id="chartBox"><span class="src">source Yahoo · quasi temps réel</span></div>
  </section>

  <section class="panel">
    <h2>Positionnement <span class="note" id="railNote"></span></h2>
    <div class="pad" id="rail"></div>
  </section>

  <section class="panel">
    <h2 id="levelsTitle">Niveaux du jour</h2>
    <table>
      <thead><tr><th>Niveau</th><th>Prix</th><th>Distance</th></tr></thead>
      <tbody id="levelsBody"></tbody>
    </table>
  </section>

  <div class="duo">
    <section class="panel">
      <h2>Expected move <span class="note" id="emNote"></span></h2>
      <div class="pad" id="emCard"></div>
    </section>
    <section class="panel">
      <h2>String Pine <span class="note">indicateur GEX Daily Levels</span></h2>
      <div class="pad">
        <div id="pineStr"></div>
        <button id="copyBtn">Copier la string Pine</button>
      </div>
    </section>
  </div>
</div>

<footer>
  <span id="footer"></span>
  <a href="/admin">admin</a>
</footer>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
const NS = "http://www.w3.org/2000/svg";
const C = {gold:"#F0B90B", teal:"#26A69A", red:"#EF5350", muted:"#8A8A94",
           faint:"#5C5C66", line:"#212127", text:"#ECEAE4"};
const KIND_COLOR = {res:C.teal, sup:C.red, res0:C.teal, sup0:C.red, flip:C.gold,
                    gpos:C.teal, gneg:C.red, emh:C.text, eml:C.text,
                    ivh:C.muted, ivl:C.muted, mpain:C.gold, emb:C.text};
const SHORT = {res:"CW", sup:"PW", res0:"CW0", sup0:"PW0", flip:"Flip",
               emh:"EM+", eml:"EM−", mpain:"MP"};
const fmt = (v, d=1) => v==null ? "—" : Number(v).toLocaleString("fr-FR",
                {minimumFractionDigits:d, maximumFractionDigits:d});
let TARGET = "NQ";
try{ TARGET = localStorage.getItem("gexTarget") || "NQ"; }catch(_){}
if (!["NQ","ES","SPX"].includes(TARGET)) TARGET = "NQ";

function el(tag, attrs, parent){
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

function paintTabs(){
  document.querySelectorAll("#tabs button").forEach(b => {
    const on = b.dataset.t === TARGET;
    b.classList.toggle("on", on);
    b.setAttribute("aria-selected", on);
  });
}

async function loadTarget(){
  paintTabs();
  $("status").style.display = "block";
  $("status").textContent = "Chargement " + TARGET + "…";
  $("app").style.display = "none";
  let data;
  try{
    data = await (await fetch("levels.json?target=" + TARGET + "&t=" + Date.now())).json();
  }catch(e){}
  if (data && !data.error){ show(data); }
  else {
    $("status").textContent = "Aucun snapshot " + TARGET +
      " pour l'instant — lance le workflow GitHub Actions ou clique « ⟳ Refresh ».";
  }
}

async function load(){
  document.querySelectorAll("#tabs button").forEach(b => b.onclick = () => {
    TARGET = b.dataset.t;
    try{ localStorage.setItem("gexTarget", TARGET); }catch(_){}
    loadTarget();
  });
  await loadTarget();
  $("refreshBtn").onclick = refreshLive;
  $("basisIn").addEventListener("keydown", e => { if (e.key === "Enter") refreshLive(); });
}

async function refreshLive(){
  const btn = $("refreshBtn"), err = $("liveErr");
  btn.disabled = true; btn.textContent = "⟳ Calcul…";
  err.style.display = "none";
  const b = $("basisIn").value.trim().replace(",", ".");
  if (b !== "" && !isFinite(parseFloat(b))){
    err.textContent = "Basis invalide : un nombre (ex: 145.5) ou vide.";
    err.style.display = "block";
    btn.disabled = false; btn.textContent = "⟳ Refresh";
    return;
  }
  let key = "";
  try{ key = localStorage.getItem("gexKey") || ""; }catch(_){}
  if (!key){
    key = (prompt("Mot de passe refresh :") || "").trim();
    if (!key){ btn.disabled = false; btn.textContent = "⟳ Refresh"; return; }
  }
  try{
    const r = await fetch("/api/gex?target=" + TARGET + (b !== "" ? "&basis=" + encodeURIComponent(b) : ""),
                          {headers: {"x-gex-key": key}});
    if (r.status === 401){
      try{ localStorage.removeItem("gexKey"); }catch(_){}
      throw new Error("mot de passe invalide");
    }
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || ("HTTP " + r.status));
    try{ localStorage.setItem("gexKey", key); }catch(_){}
    show(d);
    if (d.published === false){
      err.textContent = "Calcul OK mais publication échouée → " + (d.publish_info || "raison inconnue");
      err.style.display = "block";
    }
  }catch(e){
    err.textContent = "Refresh indisponible : " + e.message;
    err.style.display = "block";
  }finally{
    btn.disabled = false; btn.textContent = "⟳ Refresh";
  }
}

/* ---- chart live : Lightweight Charts + proxy Yahoo ---- */
const CHART = {chart:null, series:null, lines:[], iv:"5m", lastBar:null, ivSec:{"1m":60,"5m":300,"15m":900},
               poll:null, levels:null};

function ensureChart(){
  if (CHART.chart || typeof LightweightCharts === "undefined"){
    if (typeof LightweightCharts === "undefined") $("chartPanel").style.display = "none";
    return !!CHART.chart;
  }
  const box = $("chartBox");
  CHART.chart = LightweightCharts.createChart(box, {
    layout:{background:{type:"solid", color:"transparent"}, textColor:C.muted,
            fontFamily:"IBM Plex Mono, monospace", fontSize:10},
    grid:{vertLines:{color:"rgba(255,255,255,.03)"}, horzLines:{color:"rgba(255,255,255,.03)"}},
    rightPriceScale:{borderColor:C.line},
    timeScale:{borderColor:C.line, timeVisible:true, secondsVisible:false},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:C.faint, width:1, style:LightweightCharts.LineStyle.Dashed},
      horzLine:{color:C.faint, width:1, style:LightweightCharts.LineStyle.Dashed}},
  });
  CHART.series = CHART.chart.addCandlestickSeries({
    upColor:C.teal, downColor:C.red, borderVisible:false,
    wickUpColor:C.teal, wickDownColor:C.red,
    priceLineColor:C.gold, priceLineStyle:LightweightCharts.LineStyle.Dotted,
  });
  new ResizeObserver(() => CHART.chart.applyOptions({width: box.clientWidth, height: box.clientHeight}))
    .observe(box);
  document.querySelectorAll("#ivs button").forEach(b => b.onclick = () => {
    CHART.iv = b.dataset.iv;
    document.querySelectorAll("#ivs button").forEach(x => x.classList.toggle("on", x === b));
    loadBars();
  });
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) pollQuote();
  });
  return true;
}

async function loadBars(){
  if (!ensureChart()) return;
  try{
    const r = await fetch(`/api/chart?target=${TARGET}&interval=${CHART.iv}`);
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || r.status);
    CHART.series.setData(d.bars);
    CHART.lastBar = d.bars[d.bars.length - 1] || null;
    $("chartNote").textContent = TARGET + " · " + d.bars.length + " bougies";
    applyLevelLines();
    clearInterval(CHART.poll);
    CHART.poll = setInterval(pollQuote, 8000);
  }catch(e){
    $("chartNote").textContent = "flux indisponible (" + e.message + ")";
  }
}

async function pollQuote(){
  if (!CHART.series || !CHART.lastBar || document.hidden) return;
  try{
    const r = await fetch(`/api/quote?target=${TARGET}`);
    const d = await r.json();
    if (!r.ok || d.price == null) return;
    const sec = CHART.ivSec[CHART.iv], p = d.price;
    const bucket = Math.floor((d.time || Date.now()/1000) / sec) * sec;
    if (bucket > CHART.lastBar.time){
      CHART.lastBar = {time:bucket, open:p, high:p, low:p, close:p};
    }else{
      CHART.lastBar = {time:CHART.lastBar.time, open:CHART.lastBar.open,
        high:Math.max(CHART.lastBar.high, p), low:Math.min(CHART.lastBar.low, p), close:p};
    }
    CHART.series.update(CHART.lastBar);
  }catch(e){}
}

function applyLevelLines(){
  if (!CHART.series || !CHART.levels) return;
  for (const pl of CHART.lines) CHART.series.removePriceLine(pl);
  CHART.lines = [];
  const dashKinds = ["flip","emh","eml","res0","sup0","mpain","emb","ivh","ivl"];
  const skip = [];
  for (const L of CHART.levels){
    if (skip.includes(L.kind)) continue;
    const solid = !dashKinds.includes(L.kind);
    CHART.lines.push(CHART.series.createPriceLine({
      price: L.price_nq,
      color: KIND_COLOR[L.kind] || C.muted,
      lineWidth: 1,
      lineStyle: solid ? LightweightCharts.LineStyle.Solid : LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: ["res","sup","flip","res0","sup0"].includes(L.kind),
      title: L.label,
    }));
  }
}

function show(d){
  $("status").style.display = "none";
  $("app").style.display = "block";

  const tgt = d.target || "NQ";
  $("hdrDate").textContent = d.date + " · " + tgt + " (" + d.symbol + ")";
  $("levelsTitle").textContent = "Niveaux du jour · échelle " + tgt;

  const live = d.mode === "live";
  const pill = $("statusPill");
  pill.classList.toggle("live", live);
  $("statusTxt").textContent = (live ? "LIVE " : "SNAPSHOT ") + d.generated_utc.slice(11,16) + " UTC"
    + (d.published === false ? " · NON PUBLIÉ" : "");

  const stats = [
    [tgt, fmt(d.nq_price), "price"],
    ["Basis", (d.basis>=0?"+":"") + fmt(d.basis) + " · " + d.basis_source, ""],
    ["Net GEX $Bn/1%", (d.net_gex_bn>=0?"+":"") + fmt(d.net_gex_bn,2), d.net_gex_bn>=0?"pos":"neg"],
    ["Régime", d.regime === "positive" ? "GAMMA +" : "GAMMA −", d.regime==="positive"?"pos":"neg"],
    ["P/C OI", d.pc_oi != null ? fmt(d.pc_oi,2) : "—", d.pc_oi > 1 ? "neg" : "pos"],
    ["IV ATM", d.iv_atm != null ? fmt(d.iv_atm*100,1) + " %" : "—", ""],
  ];
  $("badges").innerHTML = stats.map(([k,v,c],i) =>
    `<div class="cell${i===0?" price":""}"><span class="lbl">${k}</span><span class="val ${c!=="price"?c:""}">${v}</span></div>`).join("");

  CHART.levels = d.levels;
  loadBars();

  renderRail(d);
  renderLevels(d);
  renderEM(d);
  renderPine(d);
  const srcs = (d.sources||[]).filter(s=>!s.error).map(s=>s.chain.replace("_","")).join(" + ");
  $("footer").innerHTML = "Généré " + d.generated_utc.replace("T"," ").slice(0,16) + " UTC (" + d.mode + ")"
    + (srcs ? " · chaînes " + srcs : "") + " · expiries " + d.expiries.length
    + " · CBOE delayed ~15 min<br>Outil éducatif — pas un conseil financier.";
}

/* ---- rail signature : bande d'instrument, labels anti-collision ---- */
function renderRail(d){
  const marks = d.levels
    .filter(L => SHORT[L.kind])
    .map(L => ({p:L.price_nq, tag:SHORT[L.kind], color:KIND_COLOR[L.kind],
                dash:["flip","emh","eml","res0","sup0","mpain"].includes(L.kind)}));
  if (d.nq_price != null)
    marks.push({p:d.nq_price, tag:d.target||"NQ", color:C.gold, cursor:true});
  if (marks.length < 2){ $("rail").textContent = "—"; $("railNote").textContent=""; return; }

  marks.sort((a,b)=>a.p-b.p);
  const pMin = marks[0].p, pMax = marks[marks.length-1].p, span = (pMax-pMin)||1;
  const W=840, mX=34, axisY=78, laneH=17;
  const X = p => mX + (p-pMin)/span * (W-2*mX);

  // lanes anti-collision : 2 au-dessus, 2 en dessous
  const lanes = [[],[],[],[]]; // 0,1 = dessus · 2,3 = dessous
  const width = m => Math.max(m.tag.length, String(Math.round(m.p)).length) * 6.6 + 10;
  for (const m of marks){
    const x = X(m.p), w = width(m);
    let li = m.cursor ? 2 : 0;
    for (; li < 4; li++){
      const lane = lanes[li];
      if (!lane.length || x - w/2 > lane[lane.length-1].right + 6){ break; }
    }
    li = Math.min(li, 3);
    lanes[li].push({right: x + width(m)/2});
    m.lane = li;
  }
  const H = axisY + 2*laneH + 40;
  const svg = el("svg", {viewBox:`0 0 ${W} ${H}`, role:"img",
    "aria-label":"Position des niveaux gamma autour du prix"});

  // zone EM
  const emh = marks.find(m=>m.tag==="EM+"), eml = marks.find(m=>m.tag==="EM−");
  if (emh && eml)
    el("rect",{x:X(eml.p), y:axisY-12, width:Math.max(1, X(emh.p)-X(eml.p)), height:24,
      fill:"rgba(240,185,11,.06)"},svg);

  // axe
  el("line",{x1:mX-14,y1:axisY,x2:W-mX+14,y2:axisY,stroke:C.line,"stroke-width":1.4},svg);
  el("line",{x1:mX-14,y1:axisY,x2:W-mX+14,y2:axisY,stroke:"rgba(240,185,11,.18)","stroke-width":1.4,
    "stroke-dasharray":"1 5"},svg);

  for (const m of marks){
    const x = X(m.p);
    const above = m.lane < 2;
    const laneOff = (m.lane % 2) * laneH;
    const ty = above ? axisY - 26 - laneOff : axisY + 34 + laneOff;

    if (m.cursor){
      el("path",{d:`M ${x} ${axisY-11} L ${x+6} ${axisY} L ${x} ${axisY+11} L ${x-6} ${axisY} Z`,
        fill:C.gold},svg);
    }else{
      el("line",{x1:x,y1:axisY-9,x2:x,y2:axisY+9,stroke:m.color,"stroke-width":1.6,
        "stroke-dasharray":m.dash?"3 2":"none"},svg);
    }
    // connecteur discret vers le label si lane éloignée
    const cy1 = above ? axisY-11 : axisY+11;
    const cy2 = above ? ty+4 : ty-14;
    if (Math.abs(cy2-cy1) > 8)
      el("line",{x1:x,y1:cy1,x2:x,y2:cy2,stroke:m.color,opacity:.28,"stroke-width":1},svg);

    const t1 = el("text",{x:x,y:ty,fill:m.color,"font-size":10.5,"text-anchor":"middle",
      "font-family":"IBM Plex Mono, monospace","font-weight":m.cursor?600:500},svg);
    t1.textContent = m.tag;
    const t2 = el("text",{x:x,y:ty+11,fill:m.cursor?m.color:C.faint,"font-size":9.5,
      "text-anchor":"middle","font-family":"IBM Plex Mono, monospace"},svg);
    t2.textContent = fmt(m.p,0);
  }

  $("rail").innerHTML = "";
  $("rail").appendChild(svg);
  $("railNote").textContent = fmt(pMin,0) + " — " + fmt(pMax,0);
}

function renderLevels(d){
  const nq = d.nq_price;
  $("levelsBody").innerHTML = d.levels.map(L => {
    const dist = nq==null ? null : L.price_nq - nq;
    return `<tr>
      <td class="k-${L.kind}"><span class="tick"></span>${L.label}</td>
      <td class="price k-${L.kind}">${fmt(L.price_nq)}</td>
      <td class="dist">${dist==null ? "" : (dist>=0?"+":"") + fmt(dist,0) + " pts"}</td>
    </tr>`;
  }).join("");
}

function renderEM(d){
  const em = d.expected_move;
  if (!em){ $("emCard").innerHTML = `<span style="color:var(--muted)">Straddle indisponible.</span>`; $("emNote").textContent=""; return; }
  const hi = d.levels.find(L=>L.kind==="emh"), lo = d.levels.find(L=>L.kind==="eml");
  $("emNote").textContent = em.expiry + (em.quality === "indicative" ? " · quotes indicatives (hors séance)" : "");
  const bands = (em.bands||[]).map(b =>
    `<div class="em-sub">±${b.pct}% <span class="dn">${fmt(b.low)}</span> / <span class="up">${fmt(b.high)}</span>` +
    ` · dedans ${fmt(b.prob_inside,0)}% · touch ${fmt(b.prob_touch_side,0)}%</div>`).join("");
  const p100 = em.prob_inside != null
    ? `<div class="em-sub">±100% clôture dedans ${fmt(em.prob_inside,0)}% · touch/côté ${fmt(em.prob_touch_side,0)}%</div>` : "";
  $("emCard").innerHTML = `
    <div class="em-band">
      <span class="v dn">${lo?fmt(lo.price_nq):"—"}</span>
      <span class="em-mid">±${fmt(em.straddle)} pts<b>${fmt(em.em_pct,2)} %</b></span>
      <span class="v up">${hi?fmt(hi.price_nq):"—"}</span>
    </div>
    ${p100}${bands}
    <div class="em-sub" style="color:var(--faint)">ATM ${fmt(em.strike,0)} · call ${fmt(em.call_mid,2)} / put ${fmt(em.put_mid,2)}</div>`;
}

function renderPine(d){
  $("pineStr").textContent = d.pine;
  $("copyBtn").onclick = async () => {
    try{
      await navigator.clipboard.writeText(d.pine);
      $("copyBtn").textContent = "Copiée ✓ — zone " + (d.target||"NQ") + " de l'indicateur";
      setTimeout(()=>$("copyBtn").textContent = "Copier la string Pine", 1900);
    }catch(e){ $("copyBtn").textContent = "Sélectionne et copie manuellement"; }
  };
}

load();
</script>
