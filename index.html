<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NQ · GEX Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0E10; --panel:#131316; --panel2:#17171B; --border:#222228;
    --text:#E8E6E1; --muted:#7A7A85; --gold:#F0B90B; --teal:#26A69A;
    --red:#EF5350; --dim-gold:rgba(240,185,11,.14);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size:13px; line-height:1.5;
  }
  main{max-width:720px; margin:0 auto; padding:20px 16px 48px}
  header{
    display:flex; flex-wrap:wrap; align-items:center; gap:8px 14px;
    padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:12px;
  }
  h1{font-size:14px; font-weight:600; letter-spacing:.12em; color:var(--gold)}
  h1 .tick{color:var(--muted); font-weight:400}
  #hdrDate{color:var(--muted); font-size:12px}
  #modeBadge{font-size:11px; padding:2px 8px; border:1px solid var(--border); color:var(--muted)}
  #modeBadge.live{border-color:var(--gold); color:var(--gold)}
  .refresh{display:flex; gap:8px; margin-left:auto; align-items:center}
  .refresh input{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    font:inherit; font-size:12px; padding:5px 8px; width:100px;
  }
  .refresh input:focus-visible{outline:2px solid var(--gold); outline-offset:1px}
  .refresh input::placeholder{color:var(--muted)}
  button{
    background:var(--dim-gold); color:var(--gold); border:1px solid var(--gold);
    font:inherit; font-size:12px; padding:5px 14px; cursor:pointer;
  }
  button:hover{background:rgba(240,185,11,.24)}
  button:disabled{opacity:.5; cursor:wait}
  button:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .badges{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
  .badge{border:1px solid var(--border); background:var(--panel); padding:3px 10px; font-size:12px; white-space:nowrap}
  .badge b{font-weight:600}
  .badge.pos b{color:var(--teal)} .badge.neg b{color:var(--red)} .badge.gold b{color:var(--gold)}
  .panel{background:var(--panel); border:1px solid var(--border); margin-bottom:14px}
  .panel h2{
    font-size:11px; font-weight:600; letter-spacing:.14em; color:var(--muted);
    text-transform:uppercase; padding:9px 14px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; gap:10px;
  }
  .panel h2 .note{letter-spacing:0; text-transform:none; font-weight:400}
  .pad{padding:12px 14px}
  /* rail */
  #rail svg{display:block; width:100%; height:auto}
  /* table */
  table{width:100%; border-collapse:collapse}
  td{padding:6px 14px; border-bottom:1px solid var(--border); font-size:12.5px}
  tr:last-child td{border-bottom:none}
  td.price{font-weight:600; text-align:right; white-space:nowrap}
  td.dist{color:var(--muted); text-align:right; white-space:nowrap; width:84px}
  .k-res{color:var(--teal)} .k-sup{color:var(--red)} .k-flip{color:var(--gold)}
  .k-gpos{color:var(--teal); opacity:.6} .k-gneg{color:var(--red); opacity:.6}
  .k-emh,.k-eml{color:var(--text); opacity:.85}
  .k-res0{color:var(--teal); opacity:.8} .k-sup0{color:var(--red); opacity:.8}
  .k-ivh,.k-ivl{color:var(--muted)} .k-mpain{color:var(--gold); opacity:.8}
  /* EM */
  .em-band{display:flex; justify-content:space-between; align-items:center}
  .em-band .v{font-size:16px; font-weight:600}
  .em-band .up{color:var(--teal)} .em-band .dn{color:var(--red)}
  .em-mid{text-align:center; color:var(--muted); font-size:11.5px}
  .em-mid b{color:var(--gold); font-size:14px; display:block}
  .em-sub{color:var(--muted); font-size:11.5px; margin-top:8px}
  /* pine */
  #pineStr{
    background:var(--panel2); border:1px solid var(--border); padding:10px;
    font-size:11px; color:var(--muted); word-break:break-all; max-height:80px;
    overflow:auto; margin-bottom:10px;
  }
  #copyBtn{width:100%}
  #status{color:var(--muted); padding:20px 0}
  #liveErr{color:var(--red); font-size:12px; padding:6px 0 0; display:none; width:100%}
  footer{color:var(--muted); font-size:11px}
</style>
</head>
<body>
<main>

<header>
  <h1>NQ <span class="tick">/</span> GEX</h1>
  <span id="hdrDate">—</span>
  <span id="modeBadge">SNAPSHOT</span>
  <div class="refresh">
    <input id="basisIn" inputmode="decimal" placeholder="basis (opt.)"
           title="Basis NQ-NDX manuelle, ex: 145.5 — vide = basis Yahoo live">
    <button id="refreshBtn">⟳ Refresh</button>
  </div>
  <span id="liveErr"></span>
</header>

<div class="badges" id="badges"></div>

<div id="status">Chargement…</div>

<div id="app" style="display:none">
  <section class="panel">
    <h2>Positionnement</h2>
    <div class="pad" id="rail"></div>
  </section>

  <section class="panel">
    <h2>Niveaux du jour · échelle NQ</h2>
    <table><tbody id="levelsBody"></tbody></table>
  </section>

  <section class="panel">
    <h2>Expected move · straddle ATM <span class="note" id="emNote"></span></h2>
    <div class="pad" id="emCard"></div>
  </section>

  <section class="panel">
    <h2>String Pine</h2>
    <div class="pad">
      <div id="pineStr"></div>
      <button id="copyBtn">Copier la string Pine</button>
    </div>
  </section>
</div>

<footer id="footer"></footer>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
const NS = "http://www.w3.org/2000/svg";
const C = {gold:"#F0B90B", teal:"#26A69A", red:"#EF5350", muted:"#7A7A85",
           border:"#222228", text:"#E8E6E1"};
const KIND_COLOR = {res:C.teal, sup:C.red, res0:C.teal, sup0:C.red, flip:C.gold,
                    gpos:C.teal, gneg:C.red, emh:C.text, eml:C.text,
                    ivh:C.muted, ivl:C.muted, mpain:C.gold};
const SHORT = {res:"CW", sup:"PW", res0:"CW0", sup0:"PW0", flip:"Flip",
               emh:"EM+", eml:"EM−", mpain:"MP"};
const fmt = (v, d=1) => v==null ? "—" : Number(v).toLocaleString("fr-FR",
                {minimumFractionDigits:d, maximumFractionDigits:d});

function el(tag, attrs, parent){
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

async function load(){
  let data;
  try{
    data = await (await fetch("nq_levels.json?t=" + Date.now())).json();
  }catch(e){
    $("status").textContent =
      "Aucun snapshot. Lance le workflow GitHub Actions, ou clique « ⟳ Refresh ».";
  }
  if (data && !data.error) show(data);
  $("refreshBtn").onclick = refreshLive;
  $("basisIn").addEventListener("keydown", e => { if (e.key === "Enter") refreshLive(); });
}

async function refreshLive(){
  const btn = $("refreshBtn"), err = $("liveErr");
  btn.disabled = true; btn.textContent = "⟳ Calcul…";
  err.style.display = "none";
  const b = $("basisIn").value.trim().replace(",", ".");
  if (b !== "" && !isFinite(parseFloat(b))){
    err.textContent = "Basis invalide : un nombre (ex: 145.5) ou vide.";
    err.style.display = "block";
    btn.disabled = false; btn.textContent = "⟳ Refresh";
    return;
  }
  try{
    const r = await fetch("/api/gex" + (b !== "" ? "?basis=" + encodeURIComponent(b) : ""));
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || ("HTTP " + r.status));
    show(d);
  }catch(e){
    err.textContent = "Refresh live indisponible : " + e.message;
    err.style.display = "block";
  }finally{
    btn.disabled = false; btn.textContent = "⟳ Refresh";
  }
}

function show(d){
  $("status").style.display = "none";
  $("app").style.display = "block";

  $("hdrDate").textContent = d.date + " · " + d.symbol;
  const live = d.mode === "live";
  const mb = $("modeBadge");
  mb.textContent = (live ? "LIVE " : "SNAPSHOT ") + d.generated_utc.slice(11,16) + " UTC";
  mb.classList.toggle("live", live);

  const badges = [
    ["NQ", fmt(d.nq_price), "gold"],
    ["basis", (d.basis>=0?"+":"") + fmt(d.basis) + " (" + d.basis_source + ")", ""],
    ["net GEX", (d.net_gex_bn>=0?"+":"") + fmt(d.net_gex_bn,2) + " $Bn/1%", d.net_gex_bn>=0?"pos":"neg"],
    ["régime", d.regime === "positive" ? "GAMMA +" : "GAMMA −", d.regime==="positive"?"pos":"neg"],
    ["P/C OI", d.pc_oi != null ? fmt(d.pc_oi,2) : "—", d.pc_oi > 1 ? "neg" : "pos"],
    ["IV ATM", d.iv_atm != null ? fmt(d.iv_atm*100,1) + " %" : "—", ""],
  ];
  $("badges").innerHTML = badges.map(([k,v,c]) =>
    `<span class="badge ${c}">${k} <b>${v}</b></span>`).join("");

  renderRail(d);
  renderLevels(d);
  renderEM(d);
  renderPine(d);
  $("footer").textContent = "Généré " + d.generated_utc.replace("T"," ").slice(0,16) +
    " UTC (" + d.mode + ") · expiries: " + d.expiries.join(", ") +
    " · CBOE delayed ~15 min · usage éducatif, pas un conseil financier.";
}

/* ---- rail horizontal : PW / Flip / NQ / EM / CW en un coup d'oeil ---- */
function renderRail(d){
  const marks = d.levels
    .filter(L => SHORT[L.kind])
    .map(L => ({p:L.price_nq, tag:SHORT[L.kind], color:KIND_COLOR[L.kind],
                dash:["flip","emh","eml","res0","sup0","mpain"].includes(L.kind)}));
  if (d.nq_price != null)
    marks.push({p:d.nq_price, tag:"NQ", color:C.gold, nq:true});
  if (marks.length < 2){ $("rail").textContent = "—"; return; }

  marks.sort((a,b)=>a.p-b.p);
  const pMin = marks[0].p, pMax = marks[marks.length-1].p;
  const span = (pMax-pMin) || 1;
  const W=680, H=92, mX=30, axisY=52;
  const X = p => mX + (p-pMin)/span * (W-2*mX);

  const svg = el("svg",{viewBox:`0 0 ${W} ${H}`, role:"img",
    "aria-label":"Position des niveaux GEX autour du prix NQ"});
  el("line",{x1:mX-10,y1:axisY,x2:W-mX+10,y2:axisY,stroke:C.border,"stroke-width":1},svg);

  marks.forEach((m,i)=>{
    const x = X(m.p);
    const above = i % 2 === 0;
    if (m.nq){
      el("path",{d:`M ${x} ${axisY-9} L ${x-5} ${axisY-17} L ${x+5} ${axisY-17} Z`,
        fill:C.gold},svg);
      el("line",{x1:x,y1:axisY-9,x2:x,y2:axisY+9,stroke:C.gold,"stroke-width":1.6},svg);
    }else{
      el("line",{x1:x,y1:axisY-7,x2:x,y2:axisY+7,stroke:m.color,"stroke-width":1.4,
        "stroke-dasharray":m.dash?"3 2":"none"},svg);
    }
    const ty = m.nq ? axisY+22 : (above ? axisY-24 : axisY+22);
    const t1 = el("text",{x:x,y:ty,fill:m.color,"font-size":10.5,"text-anchor":"middle",
      "font-weight":m.nq?600:400},svg);
    t1.textContent = m.tag;
    const t2 = el("text",{x:x,y:ty+12,fill:m.nq?m.color:C.muted,"font-size":9.5,
      "text-anchor":"middle"},svg);
    t2.textContent = fmt(m.p,0);
  });

  $("rail").innerHTML = "";
  $("rail").appendChild(svg);
}

function renderLevels(d){
  const nq = d.nq_price;
  $("levelsBody").innerHTML = d.levels.map(L => {
    const dist = nq==null ? null : L.price_nq - nq;
    return `<tr>
      <td class="k-${L.kind}">${L.label}</td>
      <td class="price k-${L.kind}">${fmt(L.price_nq)}</td>
      <td class="dist">${dist==null ? "" : (dist>=0?"+":"") + fmt(dist,0) + " pts"}</td>
    </tr>`;
  }).join("");
}

function renderEM(d){
  const em = d.expected_move;
  if (!em){ $("emCard").innerHTML = `<span style="color:var(--muted)">Straddle indisponible.</span>`; $("emNote").textContent=""; return; }
  const hi = d.levels.find(L=>L.kind==="emh"), lo = d.levels.find(L=>L.kind==="eml");
  $("emNote").textContent = em.expiry;
  $("emCard").innerHTML = `
    <div class="em-band">
      <span class="v dn">${lo?fmt(lo.price_nq):"—"}</span>
      <span class="em-mid">±${fmt(em.straddle)} pts<b>${fmt(em.em_pct,2)} %</b></span>
      <span class="v up">${hi?fmt(hi.price_nq):"—"}</span>
    </div>
    <div class="em-sub">ATM ${fmt(em.strike,0)} · call ${fmt(em.call_mid,2)} / put ${fmt(em.put_mid,2)}</div>`;
}

function renderPine(d){
  $("pineStr").textContent = d.pine;
  $("copyBtn").onclick = async () => {
    try{
      await navigator.clipboard.writeText(d.pine);
      $("copyBtn").textContent = "Copiée ✓";
      setTimeout(()=>$("copyBtn").textContent = "Copier la string Pine", 1600);
    }catch(e){ $("copyBtn").textContent = "Sélectionne et copie manuellement"; }
  };
}

load();
</script>
</body>
</html>
