<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TheHub - GexDashboard</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<meta name="description" content="Gamma Levels et GEX Levels quotidiens pour NQ, ES et SPX : call wall, put wall, gamma flip, expected move et grille sigma, en temps réel pendant la session US.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="/ui.js"></script>
<style>
  :root{
    --bg:#0A0A0C; --surface:#111114; --surface2:#16161A;
    --line:#212127; --line-strong:#2B2B33;
    --text:#ECEAE4; --muted:#8A8A94; --faint:#5C5C66;
    --gold:#F0B90B; --gold-soft:rgba(240,185,11,.13); --gold-glow:rgba(240,185,11,.32);
    --teal:#26A69A; --red:#EF5350;
    --mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --disp:"Space Grotesk", var(--mono);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{scrollbar-color:var(--line-strong) var(--bg)}
  body{
    background:
      radial-gradient(1100px 420px at 50% -180px, rgba(240,185,11,.055), transparent 62%),
      var(--bg);
    color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:""; position:fixed; inset:0 0 auto 0; height:1px; z-index:10;
    background:linear-gradient(90deg, transparent, var(--gold-glow), transparent);
  }
  main{max-width:880px; margin:0 auto; padding:26px 20px 56px}
  ::selection{background:var(--gold-soft); color:var(--gold)}
  a{color:var(--gold)}
  button, input{font-family:var(--mono)}

  /* ============ header ============ */
  header{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding-bottom:18px; margin-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .mark{width:30px; height:30px; flex:none}
  .brand{display:flex; flex-direction:column; gap:1px; margin-right:4px}
  .brand h1{
    font-family:var(--disp); font-size:16px; font-weight:700;
    letter-spacing:.22em; color:var(--text); text-transform:uppercase; white-space:nowrap;
  }
  .brand h1 em{font-style:normal; color:var(--gold)}
  .brand .sub{font-size:10.5px; color:var(--faint); letter-spacing:.08em}
  #statusPill{
    display:inline-flex; align-items:center; gap:7px;
    border:1px solid var(--line-strong); background:var(--surface);
    padding:5px 12px; font-size:11px; letter-spacing:.06em; color:var(--muted);
    white-space:nowrap;
  }
  #statusPill .dot{width:6px; height:6px; border-radius:50%; background:var(--faint); flex:none}
  #statusPill.live{border-color:rgba(240,185,11,.45); color:var(--gold)}
  #statusPill.live .dot{background:var(--gold); box-shadow:0 0 8px var(--gold-glow)}
  @media(prefers-reduced-motion:no-preference){
    #statusPill.live .dot{animation:pulse 2.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  }

  .topnav{
    margin-left:auto; display:flex; align-items:center; gap:4px; flex-wrap:wrap;
  }
  .topnav a{
    text-decoration:none; font-size:12px; white-space:nowrap;
    display:inline-flex; align-items:center; gap:7px;
    transition:color .12s ease, border-color .12s ease,
               background .12s ease, box-shadow .12s ease;
  }
  /* filet de séparation entre les 3 familles */
  .nav-sep{
    width:1px; height:18px; background:var(--line-strong);
    margin:0 9px; flex:0 0 auto;
  }
  /* 1. section applicative : encadrée, c'est un "lieu" du produit */
  .topnav a.nav-app{
    color:var(--text); padding:7px 14px;
    background:var(--surface2); border:1px solid var(--line-strong);
  }
  .topnav a.nav-app .ic{ color:var(--gold); font-size:11px; }
  .topnav a.nav-app:hover{
    color:var(--gold); border-color:rgba(240,185,11,.55);
    box-shadow:0 6px 18px -10px var(--gold-glow);
  }
  /* 2. liens externes : sans cadre pour alléger, pastille colorée qui accroche */
  .topnav a.nav-ext{
    color:var(--muted); padding:7px 10px;
    background:none; border:1px solid transparent;
  }
  .topnav a.nav-ext .dot{
    width:7px; height:7px; border-radius:50%; flex:0 0 auto;
    box-shadow:0 0 8px currentColor;
  }
  .topnav a.nav-ext.dc .dot{ background:#5865F2; color:#5865F2; }
  .topnav a.nav-ext.tv .dot{ background:#2962FF; color:#2962FF; }
  .topnav a.nav-ext:hover{
    color:var(--text); border-color:var(--line-strong);
    background:var(--surface2);
  }
  /* 3. soutien : seul élément plein de la barre -> il capte le regard */
  .topnav a.nav-support{
    color:#0A0A0C; background:var(--gold); padding:7px 15px;
    border:1px solid var(--gold); font-weight:600;
    animation:donGlow 3.8s ease-in-out infinite;
  }
  .topnav a.nav-support:hover{
    background:#ffd23f; border-color:#ffd23f; animation:none;
    box-shadow:0 8px 22px -10px var(--gold-glow);
  }
  @keyframes donGlow{
    0%,100%{ box-shadow:0 0 0 rgba(240,185,11,0); }
    50%    { box-shadow:0 0 16px rgba(240,185,11,.35); }
  }
  @media (prefers-reduced-motion:reduce){
    .topnav a.nav-support{ animation:none; }
  }
  #tzTop{
    background:none; border:1px solid transparent; color:var(--muted);
    font:inherit; font-size:11.5px; padding:6px 6px; cursor:pointer; margin-left:0;
  }
  #tzTop:hover{ color:var(--text); border-color:var(--line-strong); }
  #tzTop:hover{border-color:rgba(240,185,11,.55)}
  #tzTop:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .topnav .ivs{margin-left:6px; opacity:.8}
  .topnav .ivs:hover{opacity:1}
  .ctxbar{
    display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;
  }
  .ctxbar #statusPill{margin-left:auto}
  #pineTopBtn{
    background:var(--gold-soft); color:var(--gold); border:1px solid var(--gold);
    font-size:12px; font-weight:500; padding:7px 14px; cursor:pointer;
    transition:background .12s ease; white-space:nowrap;
  }

  /* ============ tabs ============ */
  .tabs{display:inline-flex; border:1px solid var(--line-strong); background:var(--surface); margin-bottom:16px}
  .tabs button{
    position:relative; background:transparent; color:var(--muted); border:none;
    border-right:1px solid var(--line); padding:8px 26px; font-size:12.5px;
    letter-spacing:.04em; cursor:pointer; transition:color .12s ease;
  }
  .tabs button:last-child{border-right:none}
  .tabs button:hover{color:var(--text)}
  .tabs button:focus-visible{outline:2px solid var(--gold); outline-offset:-2px}
  .tabs button.on{color:var(--gold); font-weight:600; background:var(--gold-soft)}
  .tabs button.on::after{
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--gold);
  }

  /* ============ pine top + hint ============ */
  #pineTopBtn:hover{background:rgba(240,185,11,.24)}
  #pineTopBtn:focus-visible{outline:2px solid var(--gold); outline-offset:2px}

  /* ============ stat strip ============ */
  .stats{
    display:grid; grid-template-columns:minmax(190px, 1.4fr) repeat(5, 1fr);
    border:1px solid var(--line); background:var(--surface); margin-bottom:16px;
  }
  .cell{
    padding:12px 16px 11px; border-right:1px solid var(--line);
    display:flex; flex-direction:column; gap:2px; min-width:0;
  }
  .cell:last-child{border-right:none}
  .cell .lbl{
    font-family:var(--disp); font-size:9.5px; font-weight:600; letter-spacing:.18em;
    text-transform:uppercase; color:var(--faint); white-space:nowrap;
  }
  .cell .val{font-size:14px; font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap}
  .cell.price .val{font-size:26px; line-height:1.15; color:var(--gold); letter-spacing:-.01em}
  .cell .val.pos{color:var(--teal)} .cell .val.neg{color:var(--red)}
  @media(max-width:760px){
    .stats{grid-template-columns:repeat(3, 1fr)}
    .cell{min-width:0}
  .cell .val{overflow-wrap:anywhere}
  .cell .val .src{font-size:10px; color:var(--muted); letter-spacing:.02em}
  .cell.price{grid-column:1 / -1}
  }

  /* ============ panels ============ */
  .panel{
    background:linear-gradient(180deg, #131317, #101013);
    border:1px solid var(--line); margin-bottom:16px;
  }
  .panel > h2{
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
    font-family:var(--disp); font-size:10px; font-weight:600; letter-spacing:.2em;
    text-transform:uppercase; color:var(--muted);
    padding:11px 16px; border-bottom:1px solid var(--line);
  }
  .panel > h2::before{content:"▪"; color:var(--gold); margin-right:8px; font-size:8px}
  .panel > h2 .note{font-family:var(--mono); letter-spacing:0; text-transform:none; font-weight:400; font-size:11px; color:var(--faint)}
  .pad{padding:14px 16px}

  /* ============ chart ============ */
  .chartbox{height:400px; position:relative}
  .dp{display:flex; gap:22px; align-items:center; flex-wrap:wrap}
  .dp-big{font-family:var(--mono); font-size:30px; color:var(--text); line-height:1}
  .dp-sub{font-size:11px; color:var(--muted); margin-top:5px}
  .dp-tag{
    display:inline-block; margin-top:8px; padding:3px 10px; font-size:9.5px;
    letter-spacing:.16em; text-transform:uppercase; border:1px solid var(--line-strong);
  }
  .dp-tag.up{color:#26A69A; border-color:rgba(38,166,154,.45)}
  .dp-tag.dn{color:#EF5350; border-color:rgba(239,83,80,.45)}
  .dp-tag.mid{color:var(--muted)}
  #dpSpark{flex:none}
  .dp-exp{font-size:11.5px; color:var(--muted); line-height:1.55; border-top:1px solid var(--line)}
  .cbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:8px 12px; border-bottom:1px solid var(--line);
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .cbar::-webkit-scrollbar{display:none}
  .ivs{display:inline-flex; border:1px solid var(--line); background:var(--surface2); flex:none}
  .ivs button{
    background:transparent; color:var(--faint); border:none;
    border-right:1px solid var(--line); padding:6px 13px; font-size:11px;
    cursor:pointer; letter-spacing:.04em; font-family:var(--mono);
    min-height:30px; transition:color .12s ease, background .12s ease;
  }
  .ivs button:last-child{border-right:none}
  .ivs button:hover{color:var(--text)}
  .ivs button.on{color:var(--gold); background:var(--gold-soft); font-weight:600}
  .ivs button:focus-visible{outline:2px solid var(--gold); outline-offset:-2px}
  .chips{display:inline-flex; gap:8px; flex:none}
  .chips button{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--surface2); border:1px solid var(--line); color:var(--faint);
    font:inherit; font-size:11px; letter-spacing:.05em; padding:6px 14px;
    min-height:30px; cursor:pointer; transition:all .12s ease;
  }
  .chips button:hover{color:var(--text); border-color:var(--line-strong)}
  .chips button.on{
    color:var(--gold); border-color:rgba(240,185,11,.5);
    background:linear-gradient(180deg, rgba(240,185,11,.14), rgba(240,185,11,.06));
  }
  .chips .led{
    width:7px; height:7px; border-radius:50%; background:#33333B; flex:none;
    transition:all .12s ease;
  }
  .chips button.on .led{background:var(--gold); box-shadow:0 0 7px var(--gold-glow)}
  .chips button:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  /* CODE COULEUR PAR FAMILLE : or = GEX, teal = EM, violet = Open.
     La pastille garde une teinte même éteinte, pour identifier la famille
     d'un coup d'œil sans avoir à l'activer. */
  .chips button[data-g="gex"] .led{background:rgba(240,185,11,.28)}
  .chips button[data-g="gex"]:hover{border-color:rgba(240,185,11,.45)}
  .chips button[data-g="gex"].on{
    color:#F0B90B; border-color:rgba(240,185,11,.5);
    background:linear-gradient(180deg, rgba(240,185,11,.15), rgba(240,185,11,.05));
  }
  .chips button[data-g="gex"].on .led{background:#F0B90B; box-shadow:0 0 8px rgba(240,185,11,.6)}
  .chips button[data-g="em"] .led{background:rgba(38,166,154,.28)}
  .chips button[data-g="em"]:hover{border-color:rgba(38,166,154,.45)}
  .chips button[data-g="em"].on{
    color:#26A69A; border-color:rgba(38,166,154,.5);
    background:linear-gradient(180deg, rgba(38,166,154,.15), rgba(38,166,154,.05));
  }
  .chips button[data-g="em"].on .led{background:#26A69A; box-shadow:0 0 8px rgba(38,166,154,.6)}
  .chips button[data-g="open"] .led{background:rgba(139,92,246,.28)}
  .chips button[data-g="open"]:hover{border-color:rgba(139,92,246,.45)}
  .chips button[data-g="open"].on{
    color:#8B5CF6; border-color:rgba(139,92,246,.5);
    background:linear-gradient(180deg, rgba(139,92,246,.15), rgba(139,92,246,.05));
  }
  .chips button[data-g="open"].on .led{background:#8B5CF6; box-shadow:0 0 8px rgba(139,92,246,.6)}

  /* ============ table ============ */
  table{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums}
  thead th{
    font-family:var(--disp); font-size:9.5px; font-weight:600; letter-spacing:.16em;
    text-transform:uppercase; color:var(--faint); text-align:left;
    padding:9px 16px; border-bottom:1px solid var(--line);
  }
  thead th:not(:first-child){text-align:right}
  td{padding:7px 16px; border-bottom:1px solid var(--line); font-size:12.5px}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .1s ease}
  tbody tr:hover{background:rgba(255,255,255,.018)}
  td.price{font-weight:600; text-align:right; white-space:nowrap}
  td.dist{color:var(--muted); text-align:right; white-space:nowrap; width:92px; font-size:11.5px}
  .tick{display:inline-block; width:8px; height:8px; margin-right:9px; vertical-align:baseline; border:1.5px solid currentColor}
  .k-res{color:var(--teal)} .k-sup{color:var(--red)} .k-flip{color:var(--gold)}
  .k-res0{color:var(--teal); opacity:.75} .k-sup0{color:var(--red); opacity:.75}
  .k-gpos{color:var(--teal); opacity:.55} .k-gneg{color:var(--red); opacity:.55}
  .k-emh,.k-eml{color:var(--text); opacity:.85} .k-emb{color:var(--text); opacity:.55}
  .k-ivh,.k-ivl{color:var(--muted)} .k-mpain{color:var(--gold); opacity:.75}
  .k-flip .tick, .k-mpain .tick{transform:rotate(45deg)}
  .k-hgex{color:var(--gold)}
  .k-hgex .tick{background:currentColor}
  .k-res .tick, .k-res0 .tick, .k-gpos .tick{background:currentColor}
  .k-sup .tick, .k-sup0 .tick, .k-gneg .tick{background:currentColor}

  /* ============ two-column EM / Pine ============ */
  .duo{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  @media(max-width:820px){.duo{grid-template-columns:1fr}}
  .duo .panel{margin-bottom:0}
  .em-band{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--surface2); border:1px solid var(--line); padding:12px 14px; margin-bottom:12px;
  }
  .em-band .v{font-size:17px; font-weight:600; font-variant-numeric:tabular-nums}
  .em-band .up{color:var(--teal)} .em-band .dn{color:var(--red)}
  .em-mid{text-align:center; color:var(--muted); font-size:11px}
  .em-mid b{color:var(--gold); font-size:14px; display:block}
  .em-sub{color:var(--muted); font-size:11.5px; padding:2px 0; font-variant-numeric:tabular-nums}
  .em-sub .dn{color:var(--red)} .em-sub .up{color:var(--teal)}
  #pineStr{
    background:var(--surface2); border:1px solid var(--line); padding:11px 12px;
    font-size:10.5px; line-height:1.7; color:var(--muted); word-break:break-all;
    max-height:118px; overflow:auto; margin-bottom:12px;
  }
  #copyBtn{
    width:100%; background:var(--gold-soft); color:var(--gold);
    border:1px solid var(--gold); font-size:12px; font-weight:500;
    padding:9px 14px; cursor:pointer; transition:background .12s ease;
  }
  #copyBtn:hover{background:rgba(240,185,11,.24)}
  #copyBtn:focus-visible{outline:2px solid var(--gold); outline-offset:2px}

  /* ============ states / footer ============ */
  #status{
    color:var(--muted); padding:36px 0; text-align:center;
    border:1px dashed var(--line); background:var(--surface);
  }
  footer{
    margin-top:26px; padding-top:14px; border-top:1px solid var(--line);
    color:var(--faint); font-size:11px; line-height:1.7;
    display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  footer a{color:var(--faint); text-decoration:none}
  footer a:hover{color:var(--gold)}
  @media(prefers-reduced-motion:no-preference){
    .panel, .stats{animation:rise .28s ease-out both}
    @keyframes rise{from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:none}}
  }

  /* ============ mobile ============ */
  @media(max-width:640px){
    main{padding:16px 12px 40px}
    /* cibles tactiles confortables + pas de zoom auto iOS sur les champs */
    .chips button, .ivs button, .tabs button, #tzTop{min-height:40px}
    .chips button{padding:8px 13px; font-size:11.5px}
    input, select, textarea{font-size:16px}
    /* le sélecteur de fuseau et la langue passent à la ligne proprement */
    .topnav{flex-wrap:wrap; row-gap:6px}
    .nav-sep{display:none}
    header{gap:10px; padding-bottom:14px; margin-bottom:14px}
    .brand h1{font-size:14px; letter-spacing:.16em}
    .brand .sub{font-size:10px}
    .topnav{width:100%; margin-left:0; justify-content:flex-start}
    .topnav a{padding:6px 8px; font-size:11.5px}
    .topnav .ivs{margin-left:auto}
    .ctxbar #statusPill{margin-left:0}
    #pineTopBtn{padding:9px 12px; margin-left:auto}
    .tabs button{padding:10px 0; flex:1; min-width:64px}
    .tabs{display:flex; width:100%}
    .stats{grid-template-columns:repeat(2, 1fr)}
    .cell{padding:10px 12px}
    .cell.price .val{font-size:22px}
    .chartbox{height:300px}
    .cbar{padding:8px 10px}
    .ivs button{padding:8px 12px; min-height:36px}
    thead th, td{padding-left:12px; padding-right:12px}
    td.dist{width:auto; font-size:11px}
    .em-band .v{font-size:15px}
    footer{flex-direction:column; gap:4px}
  }

  /* ═══════════════ couche de raffinement ═══════════════ */
  /* — profondeur d'ambiance : lueur froide basse en écho au beam doré haut — */
  body{
    background:
      radial-gradient(1100px 420px at 50% -180px, rgba(240,185,11,.055), transparent 62%),
      radial-gradient(900px 500px at 50% 118%, rgba(38,166,154,.035), transparent 60%),
      var(--bg);
  }
  ::-webkit-scrollbar{width:9px; height:9px}
  ::-webkit-scrollbar-thumb{background:#26262E; border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#33333D}
  ::-webkit-scrollbar-track{background:transparent}

  .brand h1 em{text-shadow:0 0 22px var(--gold-glow)}
  .brand .sub{font-variant-numeric:tabular-nums}


  .tabs{background:var(--surface)}
  .tabs button{min-height:38px; letter-spacing:.06em}
  .tabs button.on{
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 8px 18px -10px var(--gold-glow);
  }
  #statusPill{min-height:32px; font-variant-numeric:tabular-nums}
  #pineTopBtn{min-height:32px}

  .stats{
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 14px 34px -18px rgba(0,0,0,.65);
  }
  .cell{transition:background .14s ease}
  .cell:hover{background:rgba(255,255,255,.016)}
  .cell.price{
    background:radial-gradient(340px 130px at 18% 0%, rgba(240,185,11,.09), transparent 70%);
  }
  .cell.price .val{font-size:28px; letter-spacing:-.015em; text-shadow:0 0 26px rgba(240,185,11,.22)}
  .cell .lbl{padding-bottom:1px}

  .panel{
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 14px 34px -18px rgba(0,0,0,.65);
  }
  .panel > h2{
    background:linear-gradient(180deg, rgba(255,255,255,.015), transparent);
  }
  .panel > h2::before{text-shadow:0 0 8px var(--gold-glow)}

  .cbar{background:linear-gradient(180deg, rgba(255,255,255,.012), transparent)}
  .ivs button, .chips button{min-height:32px}
  .ivs button:active, .chips button:active, #pineTopBtn:active, .tabs button:active{
    transform:translateY(1px);
  }

  tbody tr:hover{
    background:rgba(255,255,255,.02);
    box-shadow:inset 2px 0 0 rgba(240,185,11,.5);
  }

async function loadDark(){
  const big = $("dpRatio"), sub = $("dpDelta"), tag = $("dpTag"), exp = $("dpExp");
  try{
    const r = await fetch(`/api/dark?target=${TARGET}`);
    const d = await r.json();
    if (!d.last){
      big.textContent = "—";
      sub.textContent = t("dpBuild");
      tag.hidden = true; exp.textContent = "";
      return;
    }
    big.textContent = d.last.r.toFixed(1) + "%";
    const dd = d.avg20 != null ? d.last.r - d.avg20 : 0;
    sub.textContent = `${d.sym} · ${d.last.d.slice(6)}/${d.last.d.slice(4,6)} · ${t("dpAvg")} ${d.avg20 != null ? d.avg20.toFixed(1) + "%" : "—"} (${dd >= 0 ? "+" : ""}${dd.toFixed(1)} pt)`;
    tag.hidden = false;
    if (dd >= 1.5){ tag.textContent = t("dpAcc"); tag.className = "dp-tag up"; }
    else if (dd <= -1.5){ tag.textContent = t("dpDist"); tag.className = "dp-tag dn"; }
    else { tag.textContent = t("dpNeu"); tag.className = "dp-tag mid"; }
    exp.textContent = t("dpExp")(d.sym, TARGET);
    const cv = $("dpSpark"), ctx = cv.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const W = 320, H = 66;
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + "px"; cv.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    const rows = d.days.filter(x => x.r != null);
    if (rows.length >= 2){
      const vs = rows.map(x => x.r);
      const lo = Math.min(...vs) - .5, hi = Math.max(...vs) + .5;
      const X = i => 6 + i * (W - 12) / (rows.length - 1);
      const Y = v => H - 8 - (v - lo) / (hi - lo) * (H - 16);
      if (d.avg20 != null){
        ctx.strokeStyle = "rgba(240,185,11,.4)"; ctx.setLineDash([3, 4]); ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(6, Y(d.avg20)); ctx.lineTo(W - 6, Y(d.avg20)); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.strokeStyle = "#26A69A"; ctx.lineWidth = 1.6;
      ctx.beginPath();
      rows.forEach((x, i) => { const px = X(i), py = Y(x.r); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); });
      ctx.stroke();
      const lx = X(rows.length - 1), ly = Y(rows[rows.length - 1].r);
      ctx.fillStyle = "#F0B90B";
      ctx.beginPath(); ctx.arc(lx, ly, 2.6, 0, 7); ctx.fill();
    }
  }catch(_){
    big.textContent = "—"; sub.textContent = t("dpUnavail"); tag.hidden = true;
  }
}

function bindChips(){
  document.querySelectorAll("#lvChips button").forEach(b => b.onclick = () => {
    LVSHOW[b.dataset.g] = !LVSHOW[b.dataset.g];
    saveLvShow();
    paintChips();
    applyLevelLines();
  });
  paintChips();
}

/* ---- chart live : Lightweight Charts + proxy de flux marché ---- */
const CHART = {chart:null, series:null, lines:[], iv:"5m", lastBar:null, ivSec:{"1m":60,"5m":300,"15m":900},
               poll:null, levels:null, grid:null};

/* Le moteur de chart affiche les timestamps en UTC brut ; on décale chaque
   barre vers Europe/Paris (DST géré par Intl, pas d'offset codé en dur). */


function ensureChart(){
  if (CHART.chart || typeof LightweightCharts === "undefined"){
    if (typeof LightweightCharts === "undefined") $("chartPanel").style.display = "none";
    return !!CHART.chart;
  }
  const box = $("chartBox");
  CHART.chart = LightweightCharts.createChart(box, {
    layout:{background:{type:"solid", color:"transparent"}, textColor:C.muted,
            fontFamily:"IBM Plex Mono, monospace", fontSize:10},
    grid:{vertLines:{color:"rgba(255,255,255,.03)"}, horzLines:{color:"rgba(255,255,255,.03)"}},
    rightPriceScale:{borderColor:C.line},
    timeScale:{borderColor:C.line, timeVisible:true, secondsVisible:false},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:C.faint, width:1, style:LightweightCharts.LineStyle.Dashed},
      horzLine:{color:C.faint, width:1, style:LightweightCharts.LineStyle.Dashed}},
  });
  CHART.series = CHART.chart.addCandlestickSeries({
    upColor:PREFS.up, downColor:PREFS.dn, borderVisible:false,
    wickUpColor:PREFS.up, wickDownColor:PREFS.dn,
    priceLineColor:PREFS.px, priceLineWidth:2,
    priceLineStyle:LightweightCharts.LineStyle.Dashed,
  });
  new ResizeObserver(() => CHART.chart.applyOptions({width: box.clientWidth, height: box.clientHeight}))
    .observe(box);
  document.querySelectorAll("#ivs button").forEach(b => b.onclick = () => {
    CHART.iv = b.dataset.iv;
    document.querySelectorAll("#ivs button").forEach(x => x.classList.toggle("on", x === b));
    loadBars();
  });
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) pollQuote();
  });
  const tzTop = $("tzTop");
  tzTop.value = PREFS.tz;
  tzTop.onchange = () => { PREFS.tz = tzTop.value; savePrefs(); loadBars(); };
  enhanceAllSelects();          // liste déroulante thémée (le natif est rendu par l'OS)
  buildGearMenu($("gearHolder"), {
    applyColors: () => CHART.series.applyOptions({
      upColor:PREFS.up, downColor:PREFS.dn,
      wickUpColor:PREFS.up, wickDownColor:PREFS.dn, priceLineColor:PREFS.px}),
    reloadBars: loadBars,
    onLevelsChanged: () => { paintChips(); applyLevelLines(); },
    applyLabelSize: drawLevelLabels,
  });
  return true;
}

async function loadBars(){
  if (!ensureChart()) return;
  try{
    const r = await fetch(`/api/chart?target=${TARGET}&interval=${CHART.iv}`);
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || r.status);
    let bars = d.bars.map(b => ({...b, time: tzShift(b.time)}));
    // La calibration de niveau est faite CÔTÉ SERVEUR (basis dynamique sur le
    // chevauchement future/ETF) — plus de recalage client. On synthétise juste
    // la bougie du bucket ACTUEL si la dernière bougie est en retard (nuit :
    // future différé), pour que l'axe soit toujours à l'heure réelle.
    try{
      const rq = await fetch(`/api/quote?target=${TARGET}`);
      const dq = await rq.json();
      if (rq.ok && dq.price != null && bars.length){
        const sec0 = CHART.ivSec[CHART.iv];
        const nowB = Math.floor(tzShift(Date.now() / 1000) / sec0) * sec0;
        const lastB = bars[bars.length - 1];
        if (lastB && nowB > lastB.time){
          bars.push({time: nowB, open: dq.price, high: dq.price,
                     low: dq.price, close: dq.price});
        }
      }
    }catch(_){}
    const _b = $("chartBox");
    if (_b.clientWidth) { CHART._boxW = _b.clientWidth; CHART._boxH = _b.clientHeight; }
    CHART.series.setData(bars);
    CHART.lastBar = bars[bars.length - 1] || null;
    // outils de dessin : dessins propres à CE marché (persistés par navigateur)
    if (!CHART.draw)
      CHART.draw = attachDrawTools($("chartBox"), CHART.chart, CHART.series,
                                   "gexDraw:main:" + TARGET, CHART.ivSec[CHART.iv]);
    CHART.draw.setKey("gexDraw:main:" + TARGET);
    if (bars.length)
      CHART.draw.setBars(bars.map(b => b.time), CHART.ivSec[CHART.iv]);
    CHART._times = bars.map(b => b.time);
    if (!CHART.sessCv){
      CHART.sessCv = document.createElement("canvas");
      CHART.sessCv.style.cssText = "position:absolute;inset:0;pointer-events:none;z-index:0";
      $("chartBox").prepend(CHART.sessCv);
      CHART._boxW = $("chartBox").clientWidth;
      CHART._boxH = $("chartBox").clientHeight;
      CHART.lblCv = document.createElement("canvas");
      CHART.lblCv.style.cssText =
        "position:absolute;inset:0;pointer-events:none;z-index:3";
      $("chartBox").appendChild(CHART.lblCv);
      new ResizeObserver(es => {
        const r = es[0].contentRect;
        if (!r.width || !r.height) return;
        CHART._boxW = r.width; CHART._boxH = r.height;
        if (CHART._paint) CHART._paint();
      }).observe(CHART.lblCv);
      /* Redessins COALESCÉS : la souris peut émettre des dizaines
         d'événements par seconde ; on n'exécute au plus qu'un rendu par
         frame d'affichage, ce qui suffit à l'œil et divise le travail. */
      CHART._paint = () => {
        if (CHART._raf) return;
        CHART._raf = requestAnimationFrame(() => {
          CHART._raf = 0; drawIdxSessions(); drawLevelLabels();
        });
      };
      const redraw = CHART._paint;
      CHART.chart.timeScale().subscribeVisibleLogicalRangeChange(redraw);
      new ResizeObserver(() => {
        const b = $("chartBox");
        CHART._boxW = b.clientWidth; CHART._boxH = b.clientHeight;
        redraw();
      }).observe($("chartBox"));

      /* Le glissement de l'ÉCHELLE DE PRIX n'émet aucun événement exploitable.
         On surveille donc la géométrie à chaque frame : dès que la position
         d'un prix témoin bouge (zoom, drag, autoscale, kinetic scroll), on
         redessine. Coût négligeable, suivi parfait. */
      /* Suivi de l'échelle de prix : le glissement de l'axe n'émet aucun
         événement, d'où cette vérification. Mais la faire 60 fois par seconde
         en permanence était du gaspillage pur (et de la batterie sur mobile).
         Elle ne tourne désormais QUE pendant une interaction, plus un filet
         de sécurité deux fois par seconde. Le suivi reste parfait. */
      const geoCheck = () => {
        if (!CHART.series || !(CHART.lvMeta || []).length) return;
        const y = CHART.series.priceToCoordinate(CHART.lvMeta[0].price);
        const sig = `${y}|${CHART._boxH}|${CHART._boxW}`;
        if (sig !== CHART._geoSig){ CHART._geoSig = sig; CHART._paint(); }
      };
      let geoUntil = 0;
      const geoLoop = () => {
        CHART._geoRaf = requestAnimationFrame(() => {
          geoCheck();
          if (performance.now() < geoUntil) geoLoop();
          else CHART._geoRaf = 0;
        });
      };
      const geoKick = () => {
        geoUntil = performance.now() + 800;   // couvre l'inertie du scroll
        if (!CHART._geoRaf) geoLoop();
      };
      for (const ev of ["pointerdown", "wheel", "touchstart", "touchmove"])
        $("chartBox").addEventListener(ev, geoKick, {passive: true});
      window.addEventListener("pointerup", geoKick, {passive: true});
      clearInterval(CHART._geoSafe);
      CHART._geoSafe = setInterval(geoCheck, 500);

      CHART.chart.subscribeCrosshairMove(p => {
        const y = p && p.point ? p.point.y : null;
        if (y === CHART.hoverY) return;
        CHART.hoverY = y;
        CHART._paint();
      });

      /* MOBILE : pas de survol possible. Un appui (ou un glissé) sur la chart
         révèle le niveau visé ; l'étiquette s'efface seule après 3 s. */
      const box = $("chartBox");
      const touchAt = e => {
        const t = e.touches && e.touches[0];
        if (!t) return;
        CHART.hoverY = t.clientY - box.getBoundingClientRect().top;
        CHART._paint();
        clearTimeout(CHART._touchT);
        CHART._touchT = setTimeout(() => {
          CHART.hoverY = null; CHART._paint();
        }, 3000);
      };
      box.addEventListener("touchstart", touchAt, {passive: true});
      box.addEventListener("touchmove", touchAt, {passive: true});
      $("chartBox").addEventListener("dblclick",
        () => CHART.reframe && CHART.reframe());
    }
    drawIdxSessions();
    if (bars.length){
      // Recadrage ROBUSTE des DEUX axes. Le bug venait de deux sources :
      // (1) LWC restaure l'ancienne vue temps une frame après setData ;
      // (2) déplacer l'échelle de prix passe le priceScale en mode manuel,
      //     conservé au switch -> l'échelle NQ (~29000) reste plaquée sur
      //     ES (~7500) et le prix sort de l'écran.
      // Fix : on force l'axe temps ET on remet le priceScale en autoScale,
      // de façon idempotente et ré-appliquée jusqu'à ce que LWC se cale.
      const nView = {"1m": 180, "5m": 150, "15m": 120}[CHART.iv] || 150;
      const reframe = () => {
        CHART.chart.priceScale("right").applyOptions({autoScale: true});
        CHART.chart.timeScale().setVisibleLogicalRange({
          from: Math.max(0, bars.length - nView),
          to: bars.length + 6,
        });
      };
      CHART.reframe = reframe;
      reframe();
      // ré-application déterministe : à chaque frame pendant ~250ms, on
      // ré-impose le cadrage tant que LWC n'a pas fini ses ajustements
      // internes (couvre onglet lent / arrière-plan, sans dépendre du timing)
      let tries = 0;
      const settle = () => {
        reframe();
        if (++tries < 15) requestAnimationFrame(settle);
      };
      requestAnimationFrame(settle);
    } else {
      CHART.chart.timeScale().fitContent();
    }
    $("chartNote").textContent = TARGET + " · " + (TZ_CITY[PREFS.tz] || PREFS.tz);
    applyLevelLines();
    clearInterval(CHART.poll);
    // REPRISE AU RETOUR SUR L'ONGLET : en arrière-plan le navigateur gèle
    // les timers (voulu, zéro appel). Au retour, on recharge l'historique
    // manqué (si absence > 60s) au lieu de laisser un trou dans la chart.
    if (!window._visWired){
      window._visWired = true;
      let hiddenAt = null;
      document.addEventListener("visibilitychange", () => {
        if (document.hidden){ hiddenAt = Date.now(); return; }
        const away = hiddenAt ? Date.now() - hiddenAt : 0;
        hiddenAt = null;
        if (!marketPollMs()) return;       // week-end : on ne réveille rien
        if (away > 60000) loadBars();      // recharge les bougies manquées
        else pollQuote();                  // reprise immédiate du live
      });
    }
    /* Rythme du flux : rapide en séance US, lent hors séance, coupé le
       week-end (voir marketPollMs dans ui.js). Le régime est réévalué chaque
       minute, donc la bascule à l'ouverture et à la clôture est automatique. */
    function armPoll(){
      clearInterval(CHART.poll);
      CHART._pollMs = marketPollMs();
      if (CHART._pollMs){
        CHART.poll = setInterval(pollQuote, CHART._pollMs);
        pollQuote();
      } else {
        liveBadge(t("mktClosed"), null);
      }
    }
    armPoll();
    clearInterval(CHART._pollWatch);
    CHART._pollWatch = setInterval(() => {
      if (marketPollMs() !== CHART._pollMs) armPoll();
    }, 60000);
  }catch(e){
    $("chartNote").textContent = t("chartFail")(e.message);
  }
}

/* ═══ ÉTIQUETTES DE NIVEAUX ═══════════════════════════════════════════
   Calque dédié, dessiné au-dessus de la chart. Trois principes :
   • PRIORITÉ  — structure majeure (walls/flip) > reste GEX/EM > grille Open.
   • ANTI-COLLISION — une étiquette n'est posée que si elle ne recouvre pas
     une étiquette déjà posée ; les niveaux évincés laissent un simple point
     coloré au bord droit (on sait qu'ils sont là, sans encombrer).
   • SURVOL — approcher le curseur d'une ligne révèle son étiquette complète
     (code + prix), en pleine intensité, même si elle avait été évincée ;
     tout le reste s'estompe pour isoler la lecture.                     */
const IS_TOUCH = matchMedia("(hover: none), (pointer: coarse)").matches;

function drawLevelLabels(){
  const cv = CHART.lblCv, box = $("chartBox");
  if (!cv || !CHART.chart || !CHART.series) return;
  // Dimensions MÉMORISÉES : lire clientWidth force le navigateur à recalculer
  // la mise en page (reflow). C'était fait à chaque frame et à chaque mouvement
  // de souris — le poste le plus coûteux du rendu. Le ResizeObserver les met
  // à jour, elles ne peuvent pas être périmées.
  /* Taille du canevas : on ne fixe PLUS style.width/height (le CSS inset:0
     s'en charge) et on prend la taille réellement rendue, tenue à jour par
     un ResizeObserver posé sur le canevas lui-même. Poser une taille en
     cache pouvait la laisser périmée au changement de marché : le bitmap
     ne correspondait plus à sa taille d'affichage et le navigateur l'étirait
     — d'où les étiquettes floues, visibles surtout sur mobile où le rapport
     de pixels est élevé. */
  const w = CHART._boxW || box.clientWidth, h = CHART._boxH || box.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  if (cv.width !== Math.round(w * dpr) || cv.height !== Math.round(h * dpr)){
    cv.width = Math.round(w * dpr); cv.height = Math.round(h * dpr);
  }
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const meta = CHART.lvMeta || [];
  if (!meta.length) return;

  const fs = PREFS.lblSize || 10;
  const padX = 6, rowH = fs + 9;
  // "auto" (défaut) : majeurs affichés, le reste au survol
  // "all"  : tout ce qui tient, en permanence (idéal mobile / un seul groupe)
  // "hover": rien tant qu'on ne vise pas — chart nue
  const MODE = PREFS.lblMode || (IS_TOUCH ? "all" : "auto");
  let scaleW = 62;
  try{ scaleW = CHART.chart.priceScale("right").width() || 62; }catch(_){}
  const xRight = w - scaleW - 6;
  const hoverY = CHART.hoverY;

  /* Référence de lecture : l'ancre Open si la grille est chargée, sinon le
     dernier prix. Au-dessus -> l'étiquette se pose SUR la ligne ; en dessous
     -> elle se pose SOUS la ligne. La ligne n'est jamais recouverte. */
  const ref = (CHART.grid && CHART.grid.anchor != null) ? CHART.grid.anchor
            : (CHART.lastBar ? CHART.lastBar.close : null);
  const bh = fs + 7, off = bh / 2 + 3;

  const items = [];
  for (const m of meta){
    const y = CHART.series.priceToCoordinate(m.price);
    if (y == null || y < 6 || y > h - 6) continue;
    const above = ref == null ? true : m.price >= ref;
    const ly = Math.min(h - bh / 2 - 2,
               Math.max(bh / 2 + 2, y + (above ? -off : off)));
    items.push({...m, y, ly, near: false});
  }
  if (!items.length) return;

  /* Détection du niveau visé : au lieu d'un seuil fixe (qui rate les
     niveaux quand la chart est dézoomée et qui en attrape plusieurs
     quand elle est serrée), on prend LE PLUS PROCHE dans une fenêtre
     généreuse. Un seul gagnant, toujours celui qu'on vise. */
  const REACH = IS_TOUCH ? 34 : 22;
  let anyHover = false;
  if (hoverY != null){
    let best = null, bd = REACH;
    for (const it of items){
      const d = Math.abs(it.y - hoverY);
      // à distance égale, le niveau le plus important l'emporte
      if (d < bd || (d === bd && best && it.tier < best.tier)){
        bd = d; best = it;
      }
    }
    if (best){ best.near = true; anyHover = true; }
  }

  // ordre de pose : survolé d'abord, puis par priorité, puis du haut vers le bas
  const order = [...items].sort((a, b) =>
    (b.near - a.near) || (a.tier - b.tier) || (a.y - b.y));

  const taken = [];
  const fits = y => !taken.some(t => Math.abs(t - y) < rowH);
  // (on empile sur ly : c'est là que l'étiquette occupe vraiment la place)
  const placed = new Set();
  for (const it of order){
    if (anyHover){
      // niveau visé : toujours ; le reste selon le mode
      if (!it.near && MODE !== "all") continue;
      if (!it.near && MODE === "all" && !fits(it.ly)) continue;
    } else {
      if (MODE === "hover") continue;              // chart nue au repos
      if (!fits(it.ly)) continue;
    }
    taken.push(it.ly); placed.add(it);
  }

  ctx.font = `${fs}px "IBM Plex Mono", monospace`;
  ctx.textBaseline = "middle";
  for (const it of items){
    const shown = placed.has(it);
    if (!shown){
      // évincée : point discret au bord droit, la ligne reste identifiable
      ctx.globalAlpha = anyHover ? 0.12 : 0.5;
      ctx.fillStyle = it.color;
      ctx.beginPath();
      ctx.arc(xRight - 2, it.y, 1.7, 0, Math.PI * 2);
      ctx.fill();
      continue;
    }
    const txt = (it.code ? it.code + "  " : "") + fmtPx(it.price);
    const tw = ctx.measureText(txt).width;
    const bw = tw + padX * 2 + 3;
    const x0 = xRight - bw, y0 = it.ly - bh / 2;
    // la grille Open reste volontairement en retrait
    ctx.globalAlpha = it.near ? 1
      : (anyHover ? 0.35 : (it.tier === 3 ? 0.62 : 0.9));
    ctx.fillStyle = "rgba(12,12,15,.9)";
    ctx.fillRect(x0, y0, bw, bh);
    ctx.fillStyle = it.color;
    ctx.fillRect(x0, y0, 2, bh);                    // liseré de couleur
    ctx.fillStyle = it.near ? "#FFFFFF" : it.color;
    ctx.fillText(txt, x0 + padX + 3, it.ly + 0.5);
  }
  ctx.globalAlpha = 1;
}

function fmtPx(p){
  return Math.round(p).toLocaleString("fr-FR").replace(/[\u202f\u00a0]/g, " ");
}

function drawIdxSessions(){
  const cv = CHART.sessCv, box = $("chartBox");
  if (!cv || !CHART.chart) return;
  const w = box.clientWidth, h = box.clientHeight, dpr = window.devicePixelRatio || 1;
  if (cv.width !== Math.round(w * dpr) || cv.height !== Math.round(h * dpr)){
    cv.width = Math.round(w * dpr); cv.height = Math.round(h * dpr);
    cv.style.width = w + "px"; cv.style.height = h + "px";
  }
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  drawSessionLines(ctx, CHART.chart, CHART._times, w, h);
}

function liveBadge(msg, ok){
  let el = document.getElementById("liveBadge");
  if (!el){
    el = document.createElement("div");
    el.id = "liveBadge";
    el.style.cssText = "font:10px monospace;color:#5C5C66;padding:2px 8px;text-align:right";
    const box = document.getElementById("chartBox");
    if (box && box.parentNode) box.parentNode.insertBefore(el, box.nextSibling);
  }
  el.textContent = msg;
  el.style.color = ok === null ? "#5C5C66" : (ok ? "#26A69A" : "#EF5350");
}

async function pollQuote(){
  if (!CHART.series || !CHART.lastBar || document.hidden) return;
  try{
    const r = await fetch(`/api/quote?target=${TARGET}`);
    const d = await r.json();
    if (!r.ok || d.price == null){
      liveBadge("live: réponse invalide (" + r.status + ")", false);
      return;
    }
    liveBadge("live: " + d.source + " · " + d.price + " · tick "
      + new Date().toLocaleTimeString("fr-FR"), true);
    const sec = CHART.ivSec[CHART.iv], p = d.price;
    // bucket temporel de la bougie courante, basé sur l'HORLOGE (pas sur le
    // time Yahoo différé) : la bougie live suit l'heure réelle, plus de décalage
    const nowSec = Date.now() / 1000;
    const bucket = Math.floor(tzShift(nowSec) / sec) * sec;
    if (bucket > CHART.lastBar.time){
      // nouvelle bougie : on fige la précédente à son close, on ouvre la neuve
      if (CHART._anim){ cancelAnimationFrame(CHART._anim); CHART._anim = null; }
      const prevClose = CHART.lastBar.close;
      CHART.lastBar = {time: bucket, open: prevClose, high: Math.max(prevClose, p),
                       low: Math.min(prevClose, p), close: p};
      CHART.series.update(CHART.lastBar);
    }else{
      // bougie courante qui VIT : high/low s'étendent, close glisse vers p
      CHART.lastBar.high = Math.max(CHART.lastBar.high, p);
      CHART.lastBar.low  = Math.min(CHART.lastBar.low, p);
      animatePrice(CHART, CHART.series, CHART.lastBar, p, 1100);
    }
    if (CHART.draw) CHART.draw.pushTime(CHART.lastBar.time);
  }catch(e){ liveBadge("live: ERREUR " + (e && e.message || e), false); }
}

function applyLevelLines(){
  if (!CHART.series || !CHART.levels) return;
  for (const pl of CHART.lines) CHART.series.removePriceLine(pl);
  CHART.lines = [];
  const dashKinds = ["flip","emh","eml","res0","sup0","mpain","emb","ivh","ivl"];
  // Les lignes ne portent AUCUNE étiquette : tout est dessiné sur un calque
  // dédié (drawLevelLabels) qui gère priorités, collisions et survol.
  const meta = [];
  const addLine = (price, color, solid, code, tier) => {
    CHART.lines.push(CHART.series.createPriceLine({
      price, color, lineWidth: 1,
      lineStyle: solid ? LightweightCharts.LineStyle.Solid : LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: false, title: "",
    }));
    meta.push({price, color, code, tier});
  };

  // tier 1 = structure majeure (walls, flip, HGEX) · 2 = reste GEX/EM · 3 = grille Open
  const MAJOR = ["res","sup","flip","res0","sup0","hgex"];
  for (const L of CHART.levels){
    const grp = GROUP_KINDS.gex.includes(L.kind) ? "gex"
              : GROUP_KINDS.em.includes(L.kind) ? "em" : null;
    if (grp && !LVSHOW[grp]) continue;
    addLine(L.price_nq, KIND_COLOR[L.kind] || C.muted, !dashKinds.includes(L.kind),
            SHORT[L.kind] || "", MAJOR.includes(L.kind) ? 1 : 2);
  }
  if (LVSHOW.open && CHART.grid){
    addLine(CHART.grid.anchor, C.gold, true, "Open", 3);
    for (const g of CHART.grid.levels){
      const m = g.mult != null ? g.mult : "";
      addLine(g.up,   "#EF5350", false, "σ+" + m, 3);
      addLine(g.down, "#26A69A", false, "σ−" + m, 3);
    }
  }
  CHART.lvMeta = meta;
  drawLevelLabels();
}

function show(d){
  $("status").style.display = "none";
  $("app").style.display = "block";

  LAST_D = d;
  const tgt = d.target || "NQ";
  $("hdrDate").textContent = d.date + " · " + tgt + " (" + d.symbol + ")";
  $("levelsTitle").textContent = t("levels")(tgt);

  const live = d.mode === "live";
  const pill = $("statusPill");
  pill.classList.toggle("live", live);
  $("statusTxt").textContent = (live ? "LIVE " : "SNAPSHOT ") + d.generated_utc.slice(11,16) + " UTC"
    + (d.published === false ? t("notPub") : "");

  const stats = [
    [tgt, fmt(d.nq_price), "price"],
    [t("stBasis"), (d.basis>=0?"+":"") + fmt(d.basis) + ' <span class="src">' + (
      {manual:t("bManual"), index:t("bIndex"), "last-known":t("bLast"), none:"—"}[d.basis_source] || t("bMarket")) + "</span>", ""],
    [t("stNet"), (d.net_gex_bn>=0?"+":"") + fmt(d.net_gex_bn,2), d.net_gex_bn>=0?"pos":"neg"],
    [t("stReg"), d.regime === "positive" ? "GAMMA +" : "GAMMA −", d.regime==="positive"?"pos":"neg"],
    [t("stPC"), d.pc_oi != null ? fmt(d.pc_oi,2) : "—", d.pc_oi > 1 ? "neg" : "pos"],
    [t("stIV"), d.iv_atm != null ? fmt(d.iv_atm*100,1) + " %" : "—", ""],
  ];
  $("badges").innerHTML = stats.map(([k,v,c],i) =>
    `<div class="cell${i===0?" price":""}"><span class="lbl">${k}</span><span class="val ${c!=="price"?c:""}">${v}</span></div>`).join("");

  CHART.levels = d.levels;
  CHART.grid = d.open_grid || null;
  loadBars();

  renderLevels(d);
  renderEM(d);
  renderPine(d);
  $("footer").innerHTML = t("genFoot")(d.generated_utc.replace("T", " ").slice(0, 16));
}

function renderLevels(d){
  const nq = d.nq_price;
  $("levelsBody").innerHTML = d.levels.map(L => {
    const dist = nq==null ? null : L.price_nq - nq;
    return `<tr>
      <td class="k-${L.kind}"><span class="tick"></span>${L.label}</td>
      <td class="price k-${L.kind}">${fmt(L.price_nq)}</td>
      <td class="dist">${dist==null ? "" : (dist>=0?"+":"") + fmt(dist,0) + " " + t("pts")}</td>
    </tr>`;
  }).join("");
}

function renderEM(d){
  const em = d.expected_move;
  if (!em){ $("emCard").innerHTML = `<span style="color:var(--muted)">${t("emNone")}</span>`; $("emNote").textContent=""; return; }
  const hi = d.levels.find(L=>L.kind==="emh"), lo = d.levels.find(L=>L.kind==="eml");
  const daily = em.source && em.source.indexOf("0.8") === 0;
  $("emNote").textContent = daily ? t("emDaily") : (em.expiry || "");
  const bands = (em.bands||[]).map(b =>
    `<div class="em-sub">±${b.pct}% <span class="dn">${fmt(b.low)}</span> / <span class="up">${fmt(b.high)}</span>` +
    ` · ${t("emIn")} ${fmt(b.prob_inside,0)}% · ${t("emTouch")} ${fmt(b.prob_touch_side,0)}%</div>`).join("");
  const p100 = em.prob_inside != null
    ? `<div class="em-sub">±100% ${t("emClose")} ${fmt(em.prob_inside,0)}% · ${t("emSide")} ${fmt(em.prob_touch_side,0)}%</div>` : "";
  const mkt = em.market_straddle != null
    ? `<div class="em-sub" style="color:var(--faint)">${t("emMarket")} ${fmt(em.market_straddle)} ${t("pts")}` +
      `${em.market_quality === "indicative" ? t("emStaleShort") : ""}</div>` : "";
  const mid = daily
    ? `<span class="em-mid">${t("emAnchor")} ${em.anchor != null ? fmt(em.anchor,0) : ""} ±${fmt(em.straddle)} ${t("pts")}<b>${fmt(em.em_pct,2)} %</b></span>`
    : `<span class="em-mid">±${fmt(em.straddle)} ${t("pts")}<b>${fmt(em.em_pct,2)} %</b></span>`;
  $("emCard").innerHTML = `
    <div class="em-band">
      <span class="v dn">${lo?fmt(lo.price_nq):"—"}</span>
      ${mid}
      <span class="v up">${hi?fmt(hi.price_nq):"—"}</span>
    </div>
    ${p100}${bands}${mkt}`;
}

async function copyPine(d, btn, idleKey){
  try{
    await navigator.clipboard.writeText(d.pine);
    btn.textContent = t("copied")(d.target||"NQ");
    setTimeout(()=>btn.textContent = t(idleKey), 1900);
  }catch(e){ btn.textContent = t("copyMan"); }
}

function renderPine(d){
  $("pineStr").textContent = d.pine;
  $("copyBtn").onclick = () => copyPine(d, $("copyBtn"), "copy");
  $("pineTopBtn").onclick = () => copyPine(d, $("pineTopBtn"), "pineTop");
}

async function loadLinks(){
  try{
    const d = await (await fetch("/api/links")).json();
    if (d.tradingview) $("tvLink").href = d.tradingview;
    if (d.discord) $("dcLink").href = d.discord;
    if (d.donate){
      const a = $("donateLink");
      a.href = d.donate;
      a.hidden = false;
      a.title = t("donTip");
    }
  }catch(_){}
}

load();
</script>
</body>
</html>
