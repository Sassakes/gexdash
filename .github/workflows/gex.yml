name: GEX daily levels

on:
  schedule:
    # GitHub exécute les crons de ce repo avec ~2h30-3h de retard constant
    # (observé sur tous les runs). On programme donc TÔT pour RECEVOIR à l'heure :
    # planifié 09:45 UTC (11:45 Paris été) -> exécution réelle observée ~14h00-14h45 Paris.
    # Un seul cron = un seul ping Discord par jour, garanti.
    # Filets si ce run déraille : cron Vercel (~15h30+) puis refresh manuel 15h25.
    - cron: "45 9 * * 1-5"
  workflow_dispatch:
    inputs:
      basis:
        description: "Basis NQ-NDX manuelle (optionnel, ex: 145.5)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: gex-daily
  cancel-in-progress: false

jobs:
  gex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install numpy requests

      - name: Compute GEX levels
        env:
          # Optionnel : décommente pour pousser aussi vers Supabase
          # SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BASIS_INPUT: ${{ github.event.inputs.basis }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Optionnel mais recommandé : permet le routage par channel configuré
          # dans /admin.html et le garde anti-doublon des pings Discord.
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: |
          ARGS="--targets NQ,ES,SPX --n-expiries 10 --top-n 4 --out ."
          if [ -n "$BASIS_INPUT" ]; then ARGS="$ARGS --basis $BASIS_INPUT"; fi
          python gex_levels.py $ARGS

      - name: Commit results
        run: |
          git config user.name "gex-bot"
          git config user.email "gex-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "GEX levels $(date -u +%F)"
          git push
