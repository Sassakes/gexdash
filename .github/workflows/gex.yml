name: GEX daily levels

on:
  schedule:
    # Crons GitHub = UTC fixe + retards fréquents -> 3 tentatives étalées.
    # Été (Paris = UTC+2) : 14:20, 14:50, 15:20 — toutes AVANT l'open US 15:30.
    # Hiver (Paris = UTC+1) : 13:20, 13:50, 14:20 — idem.
    # Le garde anti-doublon Discord (Upstash) évite les pings multiples.
    - cron: "20 12 * * 1-5"
    - cron: "50 12 * * 1-5"
    - cron: "20 13 * * 1-5"
  workflow_dispatch:
    inputs:
      basis:
        description: "Basis NQ-NDX manuelle (optionnel, ex: 145.5)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: gex-daily
  cancel-in-progress: false

jobs:
  gex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install numpy requests

      - name: Compute GEX levels
        env:
          # Optionnel : décommente pour pousser aussi vers Supabase
          # SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BASIS_INPUT: ${{ github.event.inputs.basis }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Optionnel mais recommandé : permet le routage par channel configuré
          # dans /admin.html et le garde anti-doublon des pings Discord.
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: |
          ARGS="--targets NQ,ES,SPX --n-expiries 10 --top-n 4 --out ."
          if [ -n "$BASIS_INPUT" ]; then ARGS="$ARGS --basis $BASIS_INPUT"; fi
          python gex_levels.py $ARGS

      - name: Commit results
        run: |
          git config user.name "gex-bot"
          git config user.email "gex-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "GEX levels $(date -u +%F)"
          git push
